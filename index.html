function resolveMeasures(g){
  // MECH-2: hostile initiatives you ignored go to the voters — and can PASS
  const hostileDue=g.measures.hostile.filter(h=>h.electionTurn&&h.electionTurn<=g.turn);
  g.measures.hostile=g.measures.hostile.filter(h=>!h.electionTurn||h.electionTurn>g.turn);
  for(const h of hostileDue){
    let yes=(h.baseYes||52)+(48-g.approval)*0.3+RNG.norm(0,4);
    const passed=yes>50;
    cov(g,"AP",`${h.t}: ${passed?"PASSES":"FAILS"} (${Math.round(yes)}%–${100-Math.round(yes)}%)`,
      passed?`You never spent a dollar against it, and the voters read your silence as consent. The measure is law now — qualified against you, passed around you, binding on you. ${h.backer?ACTORS.find(a=>a.id===h.backer).nm+" spent eight figures and got a constitution-adjacent trophy; their standing with their own members just went up, at your expense.":""} Ignoring a qualified initiative is a bet; you lost it.`
      :`It failed without your help — the No side's money came from elsewhere and the polling gods were kind. You got away with ignoring a loaded gun on the ballot. The signature vendors will reload.`);
    if(passed){dAp(g,-3);g.fiscal.deficit=clamp(g.fiscal.deficit+0.6,-18,99);
      if(h.backer)dAct(g,h.backer,12);}
  }
  // SHELF-5: measures still gathering signatures are NOT on this ballot
  const due=g.measures.pending.filter(m=>!m.gathering&&(!m.electionTurn||m.electionTurn<=g.turn));
  g.measures.pending=g.measures.pending.filter(m=>m.gathering||(m.electionTurn&&m.electionTurn>g.turn));
  for(const m of due){
    let yes=m.baseYes+(g.approval-48)*0.25+(m.playerSpend||0)*0.4;
    for(const o of m.oppose)if(g.actors[o]<=-20)yes-=6;
    yes+=RNG.norm(0,4);
    const passed=yes>50;
    cov(g,"AP",`${m.t}: ${passed?"PASSES":"FAILS"} (${Math.round(yes)}%–${100-Math.round(yes)}%)`,
      passed?`The measure you qualified is now ${m.type==="ICA"?"in the Constitution":"statute"}. The opposition spent ${["heavily","roughly $80M","everything the unions had on hand"][RNG.int(0,2)]}; it wasn't enough.`:
      `The No campaign's closing ad ran everywhere, and the measure died. You went around the Legislature and the voters sent you back to it. The building will be insufferable for a month.`);
    if(passed){
      for(const[id,d]of Object.entries(m.yesFx.act||{}))dAct(g,id,d);
      if(m.yesFx.issue&&m.yesFx.issue.pensionCut){g.fiscal.pension-=m.yesFx.issue.pensionCut;g.flags.pensionReformed=true;}
      // ACT-2: voter-approved measures are law — permanent, and harder to repeal than anything you sign
      if(m.yesFx.issue&&m.yesFx.issue.housingBoost)queue(g,4,{k:"law",key:"lawHousing",d:m.yesFx.issue.housingBoost},"measure takes effect: housing ("+m.t+")","you");
      if(m.yesFx.issue&&m.yesFx.issue.insurBoost)queue(g,4,{k:"law",key:"lawInsur",d:m.yesFx.issue.insurBoost},"measure takes effect: insurance ("+m.t+")","you");
      // BALLOT-1: voter-approved fiscal effects are real and permanent — revenue lands, bonds bill you
      if(m.yesFx.fiscal&&m.yesFx.fiscal.deficitCut){g.fiscal.deficit=clamp(g.fiscal.deficit-m.yesFx.fiscal.deficitCut,-18,99);
        cov(g,"LAO",`Voter-approved revenue lands: ${fmtB(m.yesFx.fiscal.deficitCut)}/yr, no supermajority required`,
          `"${m.t}" writes ${fmtB(m.yesFx.fiscal.deficitCut)} a year into the revenue base by simple majority of the electorate — the route around the 54-and-27 problem that California has used since 1978, cutting in both directions. The office notes, for the record, that voter-dedicated revenue is also voter-locked: this money is now beyond the reach of your successors, including you.`);}
      if(m.yesFx.fiscal&&m.yesFx.fiscal.deficitAdd){g.fiscal.deficit=clamp(g.fiscal.deficit+m.yesFx.fiscal.deficitAdd,-18,99);
        cov(g,"LAO",`The bond passed; the debt service starts: ${fmtB(m.yesFx.fiscal.deficitAdd)}/yr`,
          `General-obligation bonds are borrowed money with a ballot blessing. The projects are real; so is the ~30-year debt service line that begins now and outlasts everyone currently employed in the building.`);}
      m.passed=true;

  }
  g.measures.resolved=(g.measures.resolved||[]).concat(due);

/* ===================== 18. RANDOM EVENTS (base rates, DOC §6.6) ===================== */
function randomEvents(g,d){
  const m=d.m,I=g.issues;
  // Wildfire season Jun–Oct
  if(m>=6&&m<=10&&!g.flags.disasterActive){

    const catP=(g.flags.fireYearForced&&d.y===2027)?(m===10?1:0.3):0.035;
    if(RNG.chance(catP)){ // catastrophic (LA-2025 scale) — APPT: a fire-siege-tested CNRA secretary shaves the fiscal wound

        detail=`${F.dealsDC}/2 deals landed; ${F.fightsDC} fights picked`;break;}
      case "pension_reform":{const cut=256-fi.pension;progress=clamp(cut/20,0,1);
        state=g.turn>=47?(cut>=20?"kept":"broken"):"open";
        detail=`Unfunded liability cut ${fmtB(cut)} of $20B target`;break;}
    }
    out.push({id:pid,t:pr.t,cons:pr.consNm,state,progress,detail});
  }
  return out;
}

const RUN_LEDGER=[]; // F5: session-scope run history (also embedded in save envelopes)
function buildLegacy(g){
  const ps=promiseStates(g);
  const kept=ps.filter(p=>p.state==="kept").length;
  const F=g.flags,fi=g.fiscal,I=g.issues;
  const alienated=ACTORS.filter(a=>g.actors[a.id]<=-60).map(a=>a.nm);
  const inh=g.inheritedDeficit||35;
  const deficitDelta=fi.deficit-inh;
  // R3: your fingerprints — attributed, landed effects vs. the drift
  const yours=g.landedLog.filter(l=>l.by==="you");
  const fingerprints={
    count:yours.length,
    items:yours.slice(-18).map(l=>`${turnDate(l.t).label} — ${l.label}`),
    summary:yours.length===0?"The record shows no landed effects attributable to executive action. The state drifted; you watched it drift, possibly with great eloquence."
      :yours.length<8?"A light touch: a handful of attributable interventions actually landed. Most of what changed on your watch changed on its own."
      :yours.length<20?"A working governor's ledger: a steady file of executive effects that demonstrably landed — visible as ticks on the issue charts, distinguishable from drift."
      :"An interventionist's ledger: dozens of attributable effects landed across the term. Whether the state is better for the volume is a separate column.",
  };
  g.legacy={
    fingerprints,
    promises:ps,kept,
    deficit:fi.deficit,deficitDelta,
    issues:[
      ["Homelessness",`181,934 → ${I.homeless.toLocaleString()}`,(181934-I.homeless)/181934*100],
      ["Unsheltered share",`66% → ${(I.unshelt||66).toFixed(0)}%`,66-(I.unshelt||66)],
      ["Housing units (cum.)",`${Math.round(I.housingCum)}k over the term`,I.housingCum-441],
      ["Medi-Cal enrollment",`14.8M → ${I.mediCal.toFixed(1)}M (H.R.1 baseline path: ~12.5M)`,I.mediCal-12.5],
      ["Insurance stability",`38 → ${Math.round(I.insur)} / 100`,I.insur-38],
      ["Prison vs 137.5% cap",`${I.prison.toFixed(1)}% of design capacity`,137.5-I.prison],
      ["Pension unfunded",`$256B → ${fmtB(fi.pension,0)}`,256-fi.pension],
    ],
    reelected:F.reelection?F.reelection.win:null,
    over:g.over,overReason:g.overReason,
    spent:{pcLeft:g.pc,vetoes:g.bills.vetoed.length,signed:g.bills.signed.length,
      strikes:F.strikes,scandals:F.scandalCount,alienated},
    counterfactual:buildCounterfactual(g),
    approval:g.approval,
  };
  // F8: achievements (checked after legacy exists, so checks may read it)
  g.legacy.achievements=ACHIEVEMENTS.filter(a=>{try{return a.check(g);}catch(_){return false;}}).map(a=>({nm:a.nm,d:a.d}));
  // F5: run ledger
  RUN_LEDGER.push({seed:g.seed,name:g.player.name,party:g.player.party,bg:BACKGROUNDS.find(b=>b.id===g.player.bg).nm,
    scenario:g.scenario,kept,deficit:Math.round(fi.deficit*10)/10,approval:Math.round(g.approval),
    reelected:F.reelection?F.reelection.win:null,ended:g.over?"early":"full term",
    achievements:g.legacy.achievements.map(a=>a.nm)});
}
function buildCounterfactual(g){
  const lines=[];
  lines.push(`THE LAO BASELINE — what the machine would have done without you:`);
  const inh0=g.inheritedDeficit||35;
  lines.push(`• The structural deficit was ~${fmtB(inh0,0)}/yr before you walked in. Baseline drift (spending +5.8%/yr vs revenue +4%) would have carried it to ~${fmtB(inh0+2.1*3+0.9*3)} by 2031 with no action at all. You leave ${g.fiscal.deficit<0?"a modeled SURPLUS of "+fmtB(Math.abs(g.fiscal.deficit)):fmtB(g.fiscal.deficit)}.`);
  if(g.flags.marketCorrected)lines.push(`• The market correction was never yours to control. The LAO called the enacted forecast "overly exuberant" in November 2025 — fourteen months before your inauguration. The correction would have arrived for any governor. What varied was the response.`);
  else lines.push(`• The market held through your term. The LAO's "overly exuberant" warning never cashed out — you governed in the good timeline, and some of your numbers are luck wearing a suit.`);
  lines.push(`• Homelessness: the 2025 decline (−2.8%, the first ever recorded) was program-fueled, not gravity. With no state action the model's baseline drifts UP ~1% a year — ~${Math.round(181934*Math.pow(1.0096,4)).toLocaleString()} by 2031 — because rents, inflows and program sunsets do not take terms off. Every point below that in your ${g.issues.homeless.toLocaleString()} was bought: surge appropriations, executive orders, statutes, mayors who took your calls. Nothing here moved on its own.`);
  lines.push(`• H.R.1's cost shifts ($1.3B → $5B/yr) and the Medi-Cal enrollment decline toward ~12M were federal law before your election. No governor stops them; governors only choose what to backfill.`);
  lines.push(`• The verdict the report can actually render: some outcomes were never yours to control. The ones that were are listed above, priced in political capital.`);
  lines.push(`THE THESIS, FOR THE RECORD: the Governor of California is the most powerful executive in American state government — commander of a 227,500-person bureaucracy, holder of a veto that is never overridden, appointer of thousands — and still cannot amend a 1978 initiative, order an Attorney General, move a federal Receiver, schedule a capital-gains realization, or make 54 Assembly members want what they do not want. The office's power is agenda-setting plus persistence plus timing. Whatever you accomplished above, you accomplished with those three tools and no others. Whoever tells you otherwise is running for it.`);
  return lines;
}

 {id:"p98suspend",nm:"Suspend Prop 98 (one year)",cat:"Fiscal maneuvers",slots:2,pc:25,

 {id:"revsurplus",nm:"Sell Surplus State Property",cat:"Fiscal maneuvers",slots:1,pc:2,

 {id:"revfedsweep",nm:"Federal Reimbursement Sweep",cat:"Fiscal maneuvers",slots:1,pc:3,

 {id:"pensiondeal",nm:"Negotiate Pension Changes",cat:"Fiscal maneuvers",slots:2,pc:8,

 {id:"dealint",nm:"Cut a Deal with an Interest Group",cat:"Political",slots:1,pc:6,

    if(c.fx)for(const[id,d]of Object.entries(c.fx))dAct(g,id,d); // the constituencies react when the outsider is actually seated
    cov(g,"CalMatters",`${c.nm} confirmed to ${c.agencyFull}`,

  else{g.cabinet=g.cabinet.filter(x=>x!==c);dAp(g,-1.5);spendPC(g,3);
    cov(g,"Politico",`Confirmation collapses: ${c.nm} withdraws from ${c.agencyFull}`,
      (g.player.bg==="media"?"The vetting file was thin because your bench is thin — NO BENCH, priced mechanically. ":"")+

/* ---------- A1/A2/R3: sparklines with tooltips, era shading, attribution ticks ---------- */
/* Registry is monotonic (never reset): modal HTML built before a re-render keeps valid spark ids. */
let SPARK_REG={},SPARK_N=0;
function spark(arr,w=70,h=20,color="var(--blue)",opts){
  opts=opts||{};
  if(!arr||arr.length<2)return `<svg width="${w}" height="${h}"></svg>`;
  const a=arr; // A2: full term, no cap
  const id="sp"+(SPARK_N++);
  if(SPARK_N%800===0)SPARK_REG={}; // bounded: stale ids just lose their tooltip
  SPARK_REG[id]={arr:a,w,fmt:opts.fmt||(v=>typeof v==="number"?(Math.abs(v)>1000?Math.round(v).toLocaleString():(Math.round(v*10)/10)):v)};
  const min=Math.min(...a),max=Math.max(...a),rng=(max-min)||1;
  const X=i=>(i/(a.length-1)*w), Y=v=>(h-2-(v-min)/rng*(h-4));
  let rects="";
  if(opts.eras)for(const e of opts.eras){
    const x1=X(clamp((e.start-1),0,a.length-1)),x2=X(clamp((e.end||a.length)-1,0,a.length-1));
    rects+=`<rect x="${x1.toFixed(1)}" y="0" width="${Math.max(x2-x1,2).toFixed(1)}" height="${h}" fill="rgba(230,103,103,0.13)"/>`;}
  let ticks="";
  if(opts.markers)for(const mk of opts.markers){
    const x=X(clamp(mk.t-1,0,a.length-1));
    ticks+=`<path d="M${x.toFixed(1)} ${h} l-3 5 l6 0 z" fill="var(--yellow)"><title>${esc(mk.label)} — ${turnDate(mk.t).label} (yours)</title></path>`;}
  const pts=a.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const area=opts.fill?`<polygon points="0,${h} ${pts} ${w.toFixed?w.toFixed(1):w},${h}" fill="${color}" opacity="0.12"/>`:"";
  return `<svg width="${w}" height="${h+(opts.markers&&opts.markers.length?6:0)}" data-spark="${id}" style="overflow:visible">${rects}${area}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>${ticks}</svg>`;
}
/* A24: the full chart — axes, gridlines, reference lines, era shading, markers, end dot */
function chartBig(arr,opts){
  opts=opts||{};
  const w=opts.w||660,h=opts.h||190,padL=54,padR=46,padT=10,padB=20;
  if(!arr||arr.length<2)return `<div class="subtle">Not enough history yet — come back in a few months.</div>`;
  const fmt=opts.fmt||(v=>Math.abs(v)>=1000?Math.round(v).toLocaleString():(Math.round(v*10)/10));
  const id="sp"+(SPARK_N++);
  SPARK_REG[id]={arr,w:w-padL-padR,fmt,offX:padL};
  let lo=Math.min(...arr),hi=Math.max(...arr);
  if(opts.refs)for(const r of opts.refs){lo=Math.min(lo,r.v);hi=Math.max(hi,r.v);}
  const range=(hi-lo)||1;lo-=range*0.07;hi+=range*0.07;
  const X=i=>padL+(i/(arr.length-1))*(w-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(h-padT-padB);
  let out=`<svg width="100%" viewBox="0 0 ${w} ${h}" data-spark="${id}" class="bigchart" preserveAspectRatio="none" style="overflow:visible">`;
  // era shading
  if(opts.eras)for(const e of opts.eras){
    const x1=X(clamp(e.start-1,0,arr.length-1)),x2=X(clamp((e.end||arr.length)-1,0,arr.length-1));
    out+=`<rect x="${x1}" y="${padT}" width="${Math.max(x2-x1,3)}" height="${h-padT-padB}" fill="rgba(230,103,103,0.10)"/>`;}
  // gridlines + y labels (min / mid / max)
  for(const v of [lo+range*0.07,(lo+hi)/2,hi-range*0.07]){
    out+=`<line x1="${padL}" y1="${Y(v)}" x2="${w-padR}" y2="${Y(v)}" stroke="var(--grid)" stroke-width="1"/>`+
         `<text x="${padL-6}" y="${Y(v)+3}" text-anchor="end" class="axlab">${fmt(v)}</text>`;}
  // x ticks at Januaries
  for(let i=0;i<arr.length;i++){if(i%12===0){
    out+=`<line x1="${X(i)}" y1="${h-padB}" x2="${X(i)}" y2="${h-padB+4}" stroke="var(--baseline)"/>`+
         `<text x="${X(i)}" y="${h-4}" text-anchor="middle" class="axlab">${2027+Math.floor(i/12)}</text>`;}}
  // reference lines (targets, caps, inheritances)
  if(opts.refs)for(const r of opts.refs){
    out+=`<line x1="${padL}" y1="${Y(r.v)}" x2="${w-padR}" y2="${Y(r.v)}" stroke="${r.color||"var(--yellow)"}" stroke-dasharray="5 4" stroke-width="1.4"/>`+
         `<text x="${w-padR+4}" y="${Y(r.v)+3}" class="axlab" fill="${r.color||"var(--yellow)"}">${esc(r.label)}</text>`;}
  // area + line
  const pts=arr.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  out+=`<polygon points="${padL},${h-padB} ${pts} ${X(arr.length-1)},${h-padB}" fill="${opts.color||"var(--blue)"}" opacity="0.10"/>`;
  out+=`<polyline points="${pts}" fill="none" stroke="${opts.color||"var(--blue)"}" stroke-width="2.4" stroke-linejoin="round"/>`;
  // attribution markers
  if(opts.markers)for(const mk of opts.markers){const x=X(clamp(mk.t-1,0,arr.length-1));
    out+=`<path d="M${x} ${h-padB} l-4 7 l8 0 z" fill="var(--yellow)"><title>${esc(mk.label)} — ${turnDate(mk.t).label} (yours)</title></path>`;}
  // end dot + label
  const lastX=X(arr.length-1),lastY=Y(arr[arr.length-1]);
  out+=`<circle cx="${lastX}" cy="${lastY}" r="4" fill="${opts.color||"var(--blue)"}" stroke="var(--surface)" stroke-width="2"/>`+
       `<text x="${Math.min(lastX+7,w-4)}" y="${lastY-7}" class="axlab endlab">${fmt(arr[arr.length-1])}</text>`;
  out+="</svg>";
  return out;
}

/* A8: procedural monogram seals */
function seal(initials,hueSeed){let h=0;for(const ch of hueSeed)h=(h*31+ch.charCodeAt(0))%360;
  return `<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:-3px;margin-right:4px"><circle cx="8" cy="8" r="7.4" fill="hsl(${h},32%,26%)" stroke="hsl(${h},40%,52%)" stroke-width="1"/><text x="8" y="11" text-anchor="middle" font-size="7" font-family="var(--mono)" fill="#fff">${esc(initials)}</text></svg>`;}
function sealFor(hl){
  const map=[["Attorney General",OFFICERS.ag.ini],["Insurance Commissioner",OFFICERS.ins.ini],["Commissioner",OFFICERS.ins.ini],["Controller",OFFICERS.controller.ini],["Lieutenant Governor",OFFICERS.ltgov.ini],["Superintendent",OFFICERS.spi.ini],["Treasurer",OFFICERS.treasurer.ini]];
  for(const[k,ini]of map)if(hl.includes(k))return seal(ini,k);
  return "";}

/* ---------- render root (D6: error boundary) ---------- */
function render(){
  const app=document.getElementById("app");
  try{
    if(UI.screen==="creation")app.innerHTML=renderCreation();
    else if(G&&G.phase==="report")app.innerHTML=renderReport();
    else app.innerHTML=renderPlay();
    if(UI.modal)app.insertAdjacentHTML("beforeend",UI.modal);
    if(UI.ticker&&UI.ticker.length){
      app.insertAdjacentHTML("beforeend",`<div class="ticker">${UI.ticker.map(t=>`<span class="tchip ${t.good?"tg":"tb"}">${esc(t.t)}</span>`).join("")}</div>`);
      const cleared=UI.ticker;setTimeout(()=>{if(UI.ticker===cleared){UI.ticker=null;const el=document.querySelector(".ticker");if(el)el.remove();}},4500);
    }
    if(UI.toast){app.insertAdjacentHTML("beforeend",`<div class="toast">${UI.toast}</div>`);
      setTimeout(()=>{UI.toast=null;const t=document.querySelector(".toast");if(t)t.remove();},3500);}
  }catch(err){
    console.error("GS render error:",err);
    app.innerHTML=`<div class="creation"><h1 style="color:var(--critical)">Something broke.</h1>
    <p style="margin:10px 0">The renderer hit an exception (<span class="num">${esc(err.message||String(err))}</span>). Your game state is intact. Copy the save below, reload the page, and use Save/Load to restore.</p>
    <textarea style="width:100%;height:220px">${G?esc(saveBlob()):"(no game in progress)"}</textarea>
    <p style="margin-top:10px"><button class="primary" onclick="location.reload()">Reload</button></p></div>`;
  }
}
function saveBlob(){return JSON.stringify({v:SAVE_VERSION,rngState:RNG.state,rngCalls:RNG.calls,runs:RUN_LEDGER,game:G});}

/* ---------- CREATION ---------- */
function renderCreation(){
  const c=UI.cr;
  let body="";
  if(c.step===1)body=step1(c);else if(c.step===2)body=step2(c);else if(c.step===3)body=step3(c);
  else if(c.step===4)body=step4(c);else body=step5(c);
  return `<div class="creation">
    <div class="step-h"><h1>GOLDEN STATE <span class="subtle" style="font-size:12px">· Governor of California · Jan 2027–Jan 2031</span></h1>
    <span class="steps">STEP ${c.step} / 5 · seed <span class="num">${c.seed}</span></span></div>${body}
    <p class="footer-note">A deterministic simulator grounded in the July 2026 Research Model. Figures tagged VERIFIED / PROJECTED / UNVERIFIED — hover any number in-game for provenance.</p></div>`;
}
function step1(c){
  const scen=(id,nm,d)=>`<div class="card scard ${c.scenario===id?"sel":""}" data-act="scenario" data-v="${id}"><h4 style="font-size:12px">${nm}</h4><p class="subtle">${d}</p></div>`;
  return `<h2 style="margin-bottom:10px">Name and Party</h2>
  <p style="margin-bottom:10px">Party is the single largest mechanical dial in the game. The Legislature you inherit — Senate 30D–10R, Assembly ~60D–19R, a Democratic two-thirds supermajority in both chambers — does not change on day one. (It can change on you in November 2028. Ask any governor who watched a midterm from the horseshoe.)</p>
  <div style="margin:12px 0"><input type="text" id="nameInput" placeholder="Your name" value="${esc(c.name)}" style="width:280px"></div>
  <div class="cardgrid">
    <div class="card ${c.party==="D"?"sel":""}" data-act="party" data-v="D"><h4>Democrat</h4>
      <p>You can theoretically pass anything — taxes, urgency statutes — without one Republican vote. Your real opponents are <b>inside your caucus</b>: progressives and business Democrats. The Legislature does not need you. Rivas and Limón have their own ambitions. Your veto is the weakest it has ever been on paper — but overrides essentially never happen, so it still bites.</p></div>
    <div class="card ${c.party==="R"?"sel":""}" data-act="party" data-v="R"><h4>Republican</h4>
      <p>Governing against a 2/3 supermajority. <b>Your appointments stall. Your budget proposal is a press release. Your veto is your entire arsenal</b> — and it holds only because overrides are effectively unheard of. Build a coalition with moderate Democrats bill by bill, or win at the ballot box. <b>This is the hard mode, and it is real.</b></p></div>
    <div class="card ${c.party==="I"?"sel":""}" data-act="party" data-v="I"><h4>No Party Preference</h4>
      <p>Top-two makes this survivable. You have no floor votes you can count on and no primary base to punish defectors. You are pure persuasion and pure veto.</p></div>
  </div>
  <h3 style="margin:16px 0 6px;font-size:13px;color:var(--ink)">Opening scenario</h3>
  <div class="cardgrid" style="grid-template-columns:repeat(auto-fill,minmax(210px,1fr))">
    ${scen("aswritten","As Written","The July 2026 baseline, straight. The correction comes when it comes.")}
    ${scen("earlycorrection","The Correction Hits Early","The LAO's 'overheated' warning cashes out in year one. Govern the crash.")}
    ${scen("fireyear","Fire Year","A catastrophic fire season is guaranteed in year one. The FAIR Plan is waiting.")}
    ${scen("grandbargain","Grand Bargain","Leadership starts at +20 — and the hole starts at $40B. Friends, and a worse problem.")}
  </div>
  <div style="margin-top:14px"><button class="primary" data-act="crnext" ${c.party?"":"disabled"}>Continue →</button></div>`;
}
function step2(c){
  return `<h2 style="margin-bottom:6px">Background</h2>
  <p class="subtle" style="margin-bottom:10px">Not cosmetic. Each supplies attributes, assets, unique features, hard caps, and liabilities. Some are strictly richer than others. That asymmetry is intentional and realistic.</p>
  <div class="cardgrid">${BACKGROUNDS.map(b=>{
    const warn=(b.id==="labor"&&c.party==="R")?`<p class="capnote">Running as a Republican: catastrophic labor standing and near-zero GOP donor access. Allowed. Priced.</p>`:"";
    return `<div class="card ${c.bgId===b.id?"sel":""}" data-act="bg" data-v="${b.id}">
    <h4>${b.nm}${b.sub?` <span class="subtle">· ${b.sub}</span>`:""}</h4><div class="flavor">“${b.flavor}”</div>
    <div class="attr-line">${Object.entries(b.attrs).map(([k,v])=>`<span>${k} ${v}</span>`).join("")}<span>Σ ${Object.values(b.attrs).reduce((a,x)=>a+x,0)}</span><span>$${b.chest}M</span></div>
    ${b.features.map(f=>`<div class="feat"><b>▸ ${f[0]}</b> — ${f[1]}</div>`).join("")}
    <div class="feat liab"><b>⚠ ${b.liab[0]}</b> — ${b.liab[1]}</div>
    <div class="subtle" style="margin-top:4px">Caps: ${Object.entries(b.caps).map(([k,v])=>k+" ≤ "+v).join(", ")}</div>${warn}</div>`;}).join("")}</div>
  <div style="margin-top:14px"><button data-act="crback">← Back</button> <button class="primary" data-act="crnext" ${c.bgId?"":"disabled"}>Continue →</button></div>`;
}
function step3(c){
  const bg=BACKGROUNDS.find(b=>b.id===c.bgId);
  if(!c.attrs)c.attrs={...bg.attrs};
  const used=pointsUsed(bg,c.attrs),left=8-used,low=loweredCount(bg,c.attrs);
  return `<h2 style="margin-bottom:6px">Point Allocation — <span class="num" style="color:${left<0?"var(--critical)":"var(--aqua)"}">${left}</span> points left</h2>
  <p class="subtle" style="margin-bottom:10px">Raising costs 1 point below 7, 2 to reach 8, 3 to reach 9. Ten is unobtainable at creation — it must be earned. Lowering refunds 1 (min 1, max 3 attributes lowered). <b>Background caps are absolute.</b></p>
  <div class="pointbuy">${Object.keys(ATTR_NAMES).map(k=>{
    const v=c.attrs[k],cap=bg.caps[k]||9;
    const upCost=v<7?1:v===7?2:3;
    const canUp=v<cap&&v<9&&left>=upCost;
    const canDown=v>1&&(v>bg.attrs[k]||low<3||c.attrs[k]<bg.attrs[k]);
    const capped=v>=cap&&cap<9;
    return `<div class="pb-row"><div class="an"><span class="anm">${ATTR_NAMES[k]} (${k})</span><br><span class="subtle">${ATTR_DESC[k]}</span>
      ${capped?`<div class="capnote">CAP ${cap} — ${esc(bg.capWhy)}</div>`:""}</div>
      <button data-act="attr" data-k="${k}" data-d="-1" ${canDown?"":"disabled"}>−</button>
      <div class="cur num">${v}</div>
      <button data-act="attr" data-k="${k}" data-d="1" ${canUp?"":"disabled"} title="cost ${upCost}">+</button></div>`;}).join("")}</div>
  <div style="margin-top:14px"><button data-act="crback">← Back</button> <button class="primary" data-act="crnext" ${left>=0?"":"disabled"}>Continue →</button></div>`;
}
function step4(c){
  if(!c.preview){
    const tmp=newGame({seed:c.seed,name:c.name||"The Governor",party:c.party,bgId:c.bgId,attrs:c.attrs,promises:[],scenario:c.scenario});
    c.preview={margin:tmp.player.margin,pc:tmp.pc,note:tmp.player.mandateNote,coalition:tmp.player.coalition,approval:tmp.approval};
  }
  const p=c.preview;
  return `<h2 style="margin-bottom:10px">The Mandate — how you won</h2>
  <div class="mandate-box">
    <div style="font-size:15px;color:var(--ink)">November 3, 2026: <b>${esc(c.name||"You")}</b> wins by <span class="num" style="font-size:22px;color:var(--yellow)">${p.margin.toFixed(1)}</span> points.</div>
    <div class="hr"></div>
    <div class="kv"><span class="k">Starting Political Capital</span><span class="v num">${p.pc}</span></div>
    <div class="kv"><span class="k">Starting approval</span><span class="v num">${p.approval}%</span></div>
    <p style="margin-top:8px;font-style:italic;color:var(--ink2)">“${p.note}”</p>
    <p style="margin-top:6px">${p.coalition}</p>
    <p class="subtle" style="margin-top:8px">Generated deterministically from party + background + attributes + war chest, with seeded variance (seed ${c.seed}). <button class="ghost" data-act="reseed" style="font-size:11px;padding:2px 8px">↻ different seed</button></p>
  </div>
  <button data-act="crback">← Back</button> <button class="primary" data-act="crnext">Accept the mandate →</button>`;
}
function step5(c){
  const excl=c.promises.map(id=>{const p=PROMISES.find(x=>x.id===id);return p.excl;}).filter(Boolean);
  return `<h2 style="margin-bottom:6px">Promises — pick exactly 3 <span class="num" style="color:var(--aqua)">(${c.promises.length}/3)</span></h2>
  <p class="subtle" style="margin-bottom:10px">Each creates a scoring condition and a constituency that punishes betrayal at 2× the normal penalty. Visible on your dashboard for all 48 turns. This is the game's conscience.</p>
  <div class="cardgrid">${PROMISES.map(p=>{
    const sel=c.promises.includes(p.id);
    const blocked=excl.includes(p.id)&&!sel;
    return `<div class="card ${sel?"sel":""}" data-act="promise" data-v="${p.id}" style="${blocked?"opacity:.35;pointer-events:none":""}">
      <h4>${p.t}</h4><p class="subtle">${p.note}</p>
      <p style="margin-top:5px;font-size:11.5px"><b style="color:var(--aqua)">Target:</b> ${p.target}</p>
      <p style="font-size:11px;color:var(--serious)">Watching: ${p.consNm}</p></div>`;}).join("")}</div>
  <div style="margin-top:14px"><button data-act="crback">← Back</button>
  <button class="primary" data-act="begin" ${c.promises.length===3?"":"disabled"}>Take the oath — January 4, 2027 →</button></div>`;
}

/* ---------- PLAY (tabbed) ---------- */
function renderPlay(){
  const g=G,d=turnDate(g.turn),nd=nextDeadline(g);
  const apDelta=g.hist.approval.length>=2?g.approval-g.hist.approval[g.hist.approval.length-2]:0;
  const tab=UI.tab||"overview";
  let content="";
  if(tab==="overview")content=`<div class="ov-col">${tipsBanner(g)}${statTiles(g,apDelta)}${seasonPanel(g)}${budgetDesk(g)}${transitionPanel(g)}${cardPanel(g)}${setpiece(g,d)}${hsrTracker(g)}${memoPanel(g)}${legTrackerPanel(g)}${agendaPanel(g)}${promiseStrip(g)}${headlinesPanel(g)}</div>`;
  else if(tab==="state")content=`<div class="ov-col" style="max-width:1200px">${chartExplorer(g)}<div class="two-col">${fiscalPanel(g)}${issuesPanel(g)}</div></div>`;
  else if(tab==="politics")content=`<div class="two-col">${politicalPanel(g)}${promisesPanel(g)}</div>`;
  else content=`<div class="news-col">${masthead(g)}${feedPanel(g)}</div>`;
  return `${topbar(g,d,nd,apDelta)}${tabbar(g,tab)}${content}${actionBar(g)}`;
}
function tabbar(g,tab){
  const fresh=g.feed.filter(f=>f.t===g.turn||f.t===g.turn-1).length;
  const deskN=g.bills.desk.length;
  const t=(id,nm,badge)=>`<button class="tabpill ${tab===id?"on":""}" data-act="settab" data-v="${id}">${nm}${badge?`<span class="tbadge">${badge}</span>`:""}</button>`;
  return `<div class="tabbar">
    ${t("overview","THE DESK",(g.pendingCard?"!":"")+(deskN?deskN:""))}
    ${t("state","THE STATE","")}
    ${t("politics","POLITICS",Object.keys(g.campaigns||{}).length?"⚔":"")}
    ${t("news","NEWSROOM",fresh||"")}
  </div>`;
}
/* Overview: four stat tiles — the game at a glance */
function statTiles(g,apDelta){
  const M=g.market;
  const tile=(lab,val,delta,sp,cls)=>`<div class="tile ${cls||""}"><div class="tlab">${lab}</div><div class="tval num">${val}</div><div class="tdelta">${delta}</div>${sp||""}</div>`;
  return `<div class="tiles">
    ${tile("APPROVAL",g.approval.toFixed(0)+"%",`<span class="${apDelta>=0?"delta-up":"delta-dn"}">${apDelta>=0?"▲":"▼"}${Math.abs(apDelta).toFixed(1)} this month</span>`,spark(g.hist.approval,150,26,"var(--blue)",{fill:1}),"acc-blue")}
    ${g.fiscal.deficit<0
      ?tile("OPERATING SURPLUS",fmtB(Math.abs(g.fiscal.deficit),1),`<span class="delta-up">/yr · inherited a $${g.inheritedDeficit}B deficit</span>`,spark(g.hist.deficit,150,26,"var(--good)",{eras:M.eras,fill:1,fmt:v=>fmtB(v,1)}),"acc-aqua")
      :tile("STRUCTURAL DEFICIT",fmtB(g.fiscal.deficit,1),`<span class="subtle">/yr · inherited $${g.inheritedDeficit}B</span>`,spark(g.hist.deficit,150,26,"var(--red)",{eras:M.eras,fill:1,fmt:v=>fmtB(v,1)}),"crit acc-red")}
    ${tile("MARKET (AI SURGE)",M.idx.toFixed(0),`<span class="${M.mode==="exuberant"?"delta-up":M.mode==="recovery"?"subtle":"delta-dn"}">${M.mode}</span>`,spark(M.hist,150,26,M.mode==="exuberant"?"var(--aqua)":"var(--red)",{eras:M.eras,fill:1}),M.mode==="exuberant"?"acc-aqua":"acc-red")}
    ${tile("POLITICAL CAPITAL",g.pc,`<span class="subtle">honeymoon ${g.honeymoon>0?g.honeymoon+" mo left":"over"}</span>`,spark(g.hist.pc,150,26,"var(--violet)",{fill:1}),"acc-violet")}
  </div>`;
}
/* Overview: inbox + In Motion, merged & compact */
function agendaPanel(g){
  const lag=g.lag.slice().sort((a,b)=>a.due-b.due).slice(0,5);
  if(!g.inbox.length&&!lag.length)return "";
  return `<div class="panel"><h3>On the Calendar <span class="subtle">deadlines & consequences en route</span></h3>
  ${g.inbox.slice(0,4).map(i=>`<div class="inbox-item">${i.due?`<span class="due">[${i.due}]</span>`:""}<span>${i.txt}</span></div>`).join("")}
  ${lag.map(l=>`<div class="inbox-item motion"><span class="due">[${l.fx.k==="rev"?"~":""}${turnDate(l.due).label}]</span><span>⟳ ${esc(l.label)}${l.by==="you"?' <span class="pill yours">YOURS</span>':""}</span></div>`).join("")}
  ${g.lag.length>5?`<div class="subtle" style="font-size:10px">…${g.lag.length-5} more in motion</div>`:""}</div>`;
}
/* Overview: promises as a compact strip */
function promiseStrip(g){
  const ps=promiseStates(g);
  return `<div class="pstrip">${ps.map(p=>`<div class="pstrip-item" title="${esc(p.detail)} — watching: ${esc(p.cons)} (betrayal ×2)">
    <div class="pstrip-t ${p.state==="broken"?"dead":""}">${p.state==="kept"?"✓ ":p.state==="broken"?"✗ ":""}${p.t}</div>
    <div class="pbar"><div class="fill" style="width:${Math.round(p.progress*100)}%;background:${p.state==="broken"?"var(--critical)":p.state==="kept"?"var(--good)":"var(--blue)"}"></div></div></div>`).join("")}</div>`;
}
/* Overview: latest headlines, collapsed — click through to Newsroom */

function masthead(g){
  const d=turnDate(g.turn);
  return `<div class="masthead"><div class="mh-title">THE SACRAMENTO WIRE</div>
  <div class="mh-sub">Coverage of the ${esc(g.player.name)} administration · ${d.long} · Turn ${g.turn} of 48</div></div>`;

function flashCls(key,val){
  const prev=UI.prevTop[key];UI.prevTop[key]=val;
  if(prev===undefined||prev===val)return "";
  return val>prev?"flash-up":"flash-dn";
}

  <div class="tb-item"><span class="lab">Approval</span><span class="val ${flashCls("ap",g.approval)}">${g.approval.toFixed(0)}% <span class="${apDelta>=0?"delta-up":"delta-dn"}" style="font-size:11px">${apDelta>=0?"▲":"▼"}${Math.abs(apDelta).toFixed(1)}</span></span></div>
  <div class="tb-item"><span class="lab">Political Capital</span><span class="val ${flashCls("pc",g.pc)}">${g.pc}</span></div>

  <button class="ghost" data-act="system" title="Settings · Save/Load · Model Notes · Debug" style="padding:3px 9px">⚙</button></div>`;
}

    <div class="hr"></div>
    <div class="kv"><span class="k">Reserves — LAO narrow</span><span class="v ${f.resLao<10?"bad":""}">${prov("reserves_lao",fmtB(Math.max(f.resLao,0),1))}</span></div>
    <div class="kv"><span class="k">Reserves — admin defn</span><span class="v">${prov("reserves_admin",fmtB(Math.max(f.resAdmin,0),1))}</span></div>
    <div class="kv" title="Prop 2-armored: withdrawal needs a declared budget emergency + majority vote, ≤50% in year one."><span class="k">&nbsp;&nbsp;BSA (rainy day)</span><span class="v">${prov("bsa_balance",fmtB(Math.max(f.bsa,0),1))}</span></div>
    <div class="kv" title="The unarmored reserve: an ordinary majority (41 & 21) reaches it — which is why it always goes first."><span class="k">&nbsp;&nbsp;SFEU</span><span class="v">${fmtB(Math.max(f.sfeu,0),1)}</span></div>
    <div class="hr"></div>
    <div class="kv"><span class="k">Prop 98 guarantee</span><span class="v">${prov("prop98_guarantee",fmtB(f.prop98,1))}</span></div>

    <div class="kv"><span class="k">Gann headroom</span><span class="v ${g.flags.gann<2?"warn":""}"><span class="prov" title="Prop 4 (1979) appropriations limit headroom. Starting value $8B is an UNVERIFIED placeholder — DOC §6.8 has no clean figure.">${fmtB(g.flags.gann,1)}</span> <span class="tag UNVERIFIED">UNVE</span></span></div>

async function llmDispatch(g){

  try{

      headers:{"content-type":"application/json","x-api-key":UI.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,
        messages:[{role:"user",content:"You are the narration layer of a California-governor simulator. House style: CalMatters/Politico California Playbook — cold, specific, procedural, no melodrama. Below are RESOLVED events from one month (you never decide outcomes, only describe them). Write a single 120-180 word monthly dispatch synthesizing them. Name mechanisms, not vibes.\n\n"+items}]})});
    if(res.ok){const j=await res.json();const txt=j.content&&j.content[0]&&j.content[0].text;
      if(txt){cov(g,"CalMatters","The Month in Sacramento — a dispatch",txt);render();}}

}

function toast(msg){UI.toast=msg;}
function snapshotState(){return G?{ap:G.approval,pc:G.pc,def:G.fiscal.deficit,act:{...G.actors}}:null;}
function makeTicker(pre){ // A4
  if(!pre||!G)return;
  const out=[];
  const d1=G.approval-pre.ap;if(Math.abs(d1)>=0.8)out.push({t:`Approval ${d1>0?"+":""}${d1.toFixed(1)}`,good:d1>0});
  const d2=G.pc-pre.pc;if(Math.abs(d2)>=3)out.push({t:`PC ${d2>0?"+":""}${d2}`,good:d2>0});
  const d3=G.fiscal.deficit-pre.def;if(Math.abs(d3)>=0.8)out.push({t:`Deficit ${d3>0?"+":"−"}${fmtB(Math.abs(d3)).replace("−","")}`,good:d3<0});
  for(const k in G.actors){const dd=G.actors[k]-pre.act[k];
    if(Math.abs(dd)>=8)out.push({t:`${ACTORS.find(a=>a.id===k).nm} ${dd>0?"+":""}${dd}`,good:dd>0});}
  if(out.length)UI.ticker=out.slice(0,6);
}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");if(!el)return;
  const act=el.dataset.act;
  const c=UI.cr;
  switch(act){
    case "party":c.party=el.dataset.v;render();break;
    case "scenario":c.scenario=el.dataset.v;c.preview=null;render();break;
    case "bg":c.bgId=el.dataset.v;c.attrs=null;render();break;
    case "attr":{const bg=BACKGROUNDS.find(b=>b.id===c.bgId);const k=el.dataset.k,d=+el.dataset.d;
      const nv=c.attrs[k]+d;const cap=bg.caps[k]||9;
      if(nv<1||nv>Math.min(cap,9))break;
      if(d<0&&nv<bg.attrs[k]&&loweredCount(bg,c.attrs)>=3&&c.attrs[k]>=bg.attrs[k])break;
      c.attrs[k]=nv;
      if(pointsUsed(bg,c.attrs)>8)c.attrs[k]-=d;
      c.preview=null;render();break;}
    case "promise":{const id=el.dataset.v;
      if(c.promises.includes(id))c.promises=c.promises.filter(x=>x!==id);
      else if(c.promises.length<3){
        if(!c.promises.some(x=>PROMISES.find(p=>p.id===x).excl===id))c.promises.push(id);}
      render();break;}
    case "reseed":c.seed=(c.seed*1664525+1013904223)|0;if(c.seed<0)c.seed=-c.seed;c.preview=null;render();break;
    case "crnext":c.step++;render();break;
    case "crback":c.step--;c.preview=null;render();break;
    case "begin":{
      G=newGame({seed:c.seed,name:c.name||"The Governor",party:c.party,bgId:c.bgId,attrs:c.attrs,promises:c.promises,scenario:c.scenario});
      G.rngCalls=RNG.calls;UI.screen="play";UI.prevTop={};render();break;}
    case "openactions":UI.modal=actionsModal(G);render();break;
    case "openwalls":UI.modal=wallsModal(G);render();break;
    case "closemodal":if(e.target===el||el.tagName==="BUTTON"){UI.modal=null;render();}break;
    case "dowall":{const w=WALLS.find(x=>x.id===el.dataset.id);
      const first=!G.flags.wallsSeen.includes(w.id);
      if(first)G.flags.wallsSeen.push(w.id);
      cov(G,"WALL",w.nm,w.txt);
      // WALL-1: the first ask has consequences — upsides land, and the question can leak
      let outcome="";
      if(first){
        const wf=WALL_FX[w.id];
        if(wf){
          const up=wf.upside?wf.upside(G):null;
          if(up)outcome+=`<p style="margin:8px 0;font-size:12.5px;color:var(--aqua)">✦ ${up}</p>`;
          if(RNG.chance(wf.leakP)){
            wf.fx(G);
            cov(G,"Politico",wf.hl,wf.bd);
            outcome+=`<p style="margin:8px 0;font-size:12.5px;color:var(--critical)">⚠ IT LEAKED. "${wf.hl}" is in Politico by morning — the consequences just posted to your standings. Three people were in the room; the building has no rooms.</p>`;
          }else{
            outcome+=`<p class="subtle" style="margin:8px 0">The question stayed in the room — this time. Asks like this leak roughly ${Math.round(wf.leakP*100)}% of the time.</p>`;
          }
          G.rngCalls=RNG.calls;
        }
      }else outcome=`<p class="subtle" style="margin:8px 0">You've asked before. Counsel re-sends the same memo, faster and slightly annoyed. No new risk in re-reading it.</p>`;
      UI.modal=`<div class="modal-back" data-act="closemodal"><div class="modal" style="border-color:var(--critical)">
        <h2 style="color:var(--critical)">🧱 ${esc(w.nm)}</h2>
        <p class="wall-quote" style="margin-top:10px">${w.txt}</p>
        ${outcome}
        <p class="subtle" style="margin:8px 0">${esc(w.cat)} · DOC §6.3 hard gate. Filed to the Newsroom for the record.</p>
        <button class="primary" data-act="closemodal">Understood</button></div></div>`;
      render();break;}
    case "settab":UI.tab=el.dataset.v;UI.ticker=null;render();break;
    case "chartsel":UI.chartSel=el.dataset.v;render();break;
    case "signbudget":{const pre=snapshotState();finishEnactment(G,false);G.rngCalls=RNG.calls;makeTicker(pre);render();break;}
    case "vetobudget":{const pre=snapshotState();vetoBudget(G);G.rngCalls=RNG.calls;makeTicker(pre);render();break;}
    case "appointpick":{const nm=transitionPick(G,el.dataset.ag,el.dataset.c);
      G.rngCalls=RNG.calls;
      if(nm)toast(el.dataset.c==="reformer"?nm+" nominated — Senate Rules gets ~2 months.":nm+" seated at "+el.dataset.ag+".");
      render();break;}
    case "togglefeed":{const fid=el.dataset.fid;const def=el.dataset.def==="1";
      const cur=UI.expandedFeed[fid]!==undefined?UI.expandedFeed[fid]:def;
      UI.expandedFeed[fid]=!cur;render();break;}
    case "system":UI.modal=systemModal(G);render();break;
    case "doaction":{const a=ACTIONS.find(x=>x.id===el.dataset.id);
      if(a.gate){const wall=a.gate(G);
        if(wall){cov(G,"WALL",a.nm+" — the wall",wall);UI.modal=null;render();break;}}
      if(a.builder){UI.builderMix=null;UI.modal=builderModal(G);render();}
      else if(a.choices){UI.modal=choicesModal(G,a);render();}
      else{execAction(a,null);}break;}
    case "dochoice":{const a=ACTIONS.find(x=>x.id===el.dataset.id);execAction(a,el.dataset.c);break;}
    case "bbpreset":{const m=BUDGET_MIXES.find(x=>x.id===el.dataset.p);
      UI.builderMix={...m.mix};UI.builderMix._nm=m.nm;UI.modal=builderModal(G);render();break;}
    case "bbsubmit":{const a=ACTIONS.find(x=>x.id==="budget");
      const mx=UI.builderMix||{cuts:5,taxes:3,reserves:2,gimmicks:4,rosy:3};
      const nm=mx._nm;delete mx._nm;
      execAction(a,mx,nm);break;}
    case "cardopt":{const card=CARDS.find(x=>x.id===G.pendingCard.id);
      const opt=card.opts[+el.dataset.i];
      const pre=snapshotState();
      if(opt.pc)spendPC(G,opt.pc);
      opt.fx(G);
      cov(G,"Politico",`${card.t}: "${opt.l}"`,
        `Your call, on the record. The other options do not vanish — they become the counterfactual your critics cite. Situations cost no slots; they cost everything else.`);
      G.pendingCard=null;G.rngCalls=RNG.calls;makeTicker(pre);render();break;}
    case "dismisstip":{G.flags.tips[el.dataset.v]=1;render();break;}
    case "ffilter":UI.feedFilter=el.dataset.v||null;render();break;
    case "archive":UI.archQ="";UI.modal=archiveModal(G);render();break;
    case "bill":{const i=+el.dataset.i,dec=el.dataset.dec;const b=G.bills.desk[i];
      const pre=snapshotState();
      G.bills.desk.splice(i,1);
      if(dec==="sign"){enactBill(G,b,"sign");
        cov(G,"AP",`Signed: ${b.num} (${b.t})`,`${b.d} Effects propagate on the statute's own schedule — most take effect January 1; the politics took effect immediately.`);}
      else enactBill(G,b,"veto");
      G.rngCalls=RNG.calls;makeTicker(pre);render();break;}
    case "endmonth":{
      const m=turnDate(G.turn).m;
      if(m===1&&!G.fiscal.budget.proposed&&!UI.abdConfirmed){UI.modal=abdicationModal(G,"budget");render();break;}
      if(m===9&&G.bills.desk.length&&!UI.abdConfirmed){UI.modal=abdicationModal(G,"desk");render();break;}
      UI.abdConfirmed=false;
      doEndMonth();break;}
    case "confirmend":{
      UI.abdConfirmed=false;
      if(el.dataset.kind==="desk")cov(G,"Politico","The desk clears itself — the governor signs nothing, vetoes nothing",
        "Every bill became law without a signature, the constitutional shrug. Sponsors got their statutes without gratitude; opponents got no veto to campaign on; the governor got a reputation, and it is the one reputation this building never forgets: couldn't be bothered.");
      UI.modal=null;doEndMonth();break;}
    case "ffwd":{ // F10
      let hops=0;const collected=[];const startTurn=G.turn;
      while(hops<11&&!G.over&&G.phase==="play"){
        const nextM=(G.turn)%12+1;
        if(hops>0&&(G.pendingCard||G.bills.desk.length||G.flags.disasterActive||[1,5,6,8,9].includes(turnDate(G.turn).m)))break;
        if(hops===0&&(G.pendingCard||G.bills.desk.length)){toast("Something needs you this month first.");break;}
        const pre=G.feed.length;
        endMonth(G);hops++;
        collected.push(...G.feed.slice(0,Math.max(0,G.feed.length-pre)));
        if(G.pendingCard||G.bills.desk.length||G.flags.disasterActive||G.flags.recallElection)break;
        if([1,5,6,8,9].includes(turnDate(G.turn).m))break;
      }
      G.rngCalls=RNG.calls;
      UI.modal=null;
      if(hops>0&&collected.length&&!G.over&&G.phase==="play")
        UI.modal=interstitialModal(G,collected.slice(0,10),G.turn-1,hops>1?`THE LAST ${hops} MONTHS — ${turnDate(startTurn).label} → ${turnDate(G.turn-1).label}`:null);
      render();break;}
    case "save":{UI.modal=saveModal(G);render();break;}
    case "copysave":{const area=document.getElementById("saveArea");
      if(area){area.select();
        const done=()=>toast("Save copied to clipboard.");
        if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(area.value).then(done,()=>{try{document.execCommand("copy");done();}catch(_){toast("Select-all and copy manually.");}});
        else{try{document.execCommand("copy");done();}catch(_){toast("Select-all and copy manually.");}}}
      break;}
    case "doload":{const area=document.getElementById("saveArea");
      if(area){try{const env=JSON.parse(area.value);
        if(!env.v){toast("That's a v1 save (or not a save). This engine is save-format v"+SAVE_VERSION+" — cross-version loads desync silently, so they're refused loudly. Start fresh; the seed is reusable.");break;}
        if(env.v!==SAVE_VERSION){toast("Save format v"+env.v+" ≠ engine v"+SAVE_VERSION+". Refused rather than desynced.");break;}
        if(!env.game||!env.game.seed||!env.game.player)throw new Error("bad");
        G=env.game;RNG.restore(env.rngState,env.rngCalls);
        if(Array.isArray(env.runs))for(const r of env.runs)if(!RUN_LEDGER.find(x=>x.seed===r.seed&&x.name===r.name))RUN_LEDGER.push(r);
        UI.screen="play";UI.modal=null;UI.prevTop={};
        toast("Save restored — "+turnDate(G.turn).long+", turn "+G.turn+"/48 (RNG state snapped, no replay).");render();}
      catch(_){toast("That doesn't parse as a Golden State save.");}}break;}
    case "toggledebug":UI.debug=!UI.debug;render();break;
    case "printreport":try{window.print();}catch(_){}break;
    case "newgame":{UI.cr={step:1,name:"",party:null,bgId:null,attrs:null,promises:[],scenario:"aswritten",seed:Math.floor(Math.random()*2**31)|0,preview:null};G=null;UI.screen="creation";UI.modal=null;render();break;}
  }
});
function execAction(a,choice,extra){
  const pre=snapshotState();
  spendSlots(G,a.slots);spendPC(G,a.pc);
  a.run(G,choice,extra);
  G.rngCalls=RNG.calls;
  makeTicker(pre);
  UI.modal=null;render();
}
window.addEventListener("error",e=>{console.error("GS error:",e.message)});
render();
</script>
</body>
</html>
