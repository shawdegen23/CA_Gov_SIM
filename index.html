<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDEN STATE — Governor of California Simulator</title>
<meta name="description" content="GOLDEN STATE — a deterministic Governor of California simulator. Four years, a $35B structural deficit, 22 interest groups, a plural executive, and one desk everything lands on.">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230d0d0d'/><text x='50' y='72' font-size='64' text-anchor='middle' fill='%23c98500'>★</text></svg>">
<style>
  :root{
    color-scheme: dark;
    --page:#0d0d0d; --surface:#1a1a19; --surface2:#222220; --surface3:#2a2a28;
    --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,0.10);
    --blue:#3987e5; --green:#008300; --magenta:#d55181; --yellow:#c98500;
    --aqua:#199e70; --orange:#d95926; --violet:#9085e9; --red:#e66767;
    --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --critical:#d03b3b;
    --divneutral:#383835;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--page); color:var(--ink2); font-family:var(--sans); font-size:13px; line-height:1.45;}
  body{min-height:100vh;
    background:radial-gradient(1100px 500px at 75% -8%, #17171d 0%, var(--page) 58%),
               radial-gradient(900px 500px at -10% 110%, #14120d 0%, var(--page) 55%);
    background-attachment:fixed;}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--page)}
  ::-webkit-scrollbar-thumb{background:#333330;border-radius:5px;border:2px solid var(--page)}
  ::-webkit-scrollbar-thumb:hover{background:#44443f}
  #app{max-width:1520px; margin:0 auto; padding:10px 14px 60px;}
  h1,h2,h3,h4{color:var(--ink); font-weight:650;}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums;}
  button{font-family:var(--sans); background:var(--surface3); color:var(--ink); border:1px solid var(--ring);
    border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12.5px;
    transition:background .12s, border-color .12s, transform .08s, box-shadow .12s;}
  button:hover:not(:disabled){background:#333330; border-color:rgba(255,255,255,0.22); transform:translateY(-1px);}
  button:active:not(:disabled){transform:translateY(0);}
  button:disabled{opacity:.42; cursor:not-allowed;}
  button.primary{background:linear-gradient(180deg,#256abf,#184f95); border-color:#3987e5;}
  button.primary:hover:not(:disabled){background:linear-gradient(180deg,#2a78d6,#1c5cab); box-shadow:0 3px 14px rgba(57,135,229,.25);}
  button.danger{background:#5b2020; border-color:var(--critical);}
  button.ghost{background:transparent;}
  input[type=text], textarea, select{background:var(--surface2); color:var(--ink); border:1px solid var(--ring);
    border-radius:6px; padding:6px 9px; font-size:13px; font-family:var(--sans);}
  textarea{font-family:var(--mono); font-size:11px;}
  ::selection{background:#1c5cab;}

  /* ---------- top bar ---------- */
  .topbar{position:sticky; top:0; z-index:60; background:rgba(13,13,13,0.96); backdrop-filter:blur(4px);
    border-bottom:1px solid var(--grid); display:flex; align-items:center; gap:18px; padding:8px 4px; flex-wrap:wrap;}
  .topbar .brand{font-family:var(--mono); font-weight:700; color:var(--yellow); letter-spacing:.12em; font-size:12px;}
  .tb-item{display:flex; flex-direction:column; gap:1px;}
  .tb-item .lab{font-size:9.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted);}
  .tb-item .val{font-family:var(--mono); font-size:14px; color:var(--ink);}
  .tb-deadline{margin-left:auto; color:var(--warn); font-family:var(--mono); font-size:12px;}
  .delta-up{color:var(--good);} .delta-dn{color:var(--red);}

  /* ---------- layout ---------- */
  .cockpit{display:grid; grid-template-columns:300px 1fr 320px; gap:10px; margin-top:10px; align-items:start;}
  @media(max-width:1100px){.cockpit{grid-template-columns:1fr 1fr;} .col-mid{grid-column:1/-1; order:-1;}}
  @media(max-width:760px){.cockpit{grid-template-columns:1fr;}}
  .panel{background:linear-gradient(180deg,#1c1c1b, var(--surface)); border:1px solid var(--grid); border-radius:10px;
    padding:10px 12px; margin-bottom:10px; box-shadow:0 2px 10px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.03);}
  .panel h3{font-size:10.5px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted);
    border-bottom:1px solid var(--grid); padding-bottom:5px; margin-bottom:8px; display:flex; justify-content:space-between;}
  .panel h3::before{content:"▮ "; color:var(--yellow); font-size:8px; vertical-align:1px;}
  .kv{display:flex; justify-content:space-between; align-items:baseline; padding:2px 0; gap:8px;}
  .kv .k{color:var(--ink2); font-size:12px;}
  .kv .v{font-family:var(--mono); color:var(--ink); font-size:12.5px; text-align:right; white-space:nowrap;}
  .kv .v.bad{color:var(--red);} .kv .v.good{color:var(--good);} .kv .v.warn{color:var(--warn);}
  .bignum{font-family:var(--mono); font-size:28px; color:var(--critical); font-weight:700; letter-spacing:-.02em;
    text-shadow:0 0 22px rgba(208,59,59,.38), 0 0 3px rgba(208,59,59,.3);}
  .prov{cursor:help; border-bottom:1px dotted var(--baseline);}
  .tag{font-family:var(--mono); font-size:8.5px; padding:1px 4px; border-radius:3px; vertical-align:middle; letter-spacing:.05em;}
  .tag.VERIFIED{background:#0e2a0e; color:#7dc87d;} .tag.PROJECTED{background:#2a230e; color:#d8b45a;}
  .tag.UNVERIFIED{background:#2a0e0e; color:#d88a8a;} .tag.SYNTHETIC{background:#1d1430; color:#b0a5e6;}
  .subtle{color:var(--muted); font-size:11px;}
  .hr{border-top:1px solid var(--grid); margin:7px 0;}

  /* actor board */
  .actor-row{display:grid; grid-template-columns:118px 1fr 34px; gap:6px; align-items:center; padding:1.5px 0; cursor:help;}
  .actor-row .nm{font-size:11px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .abar{height:7px; background:var(--surface3); border-radius:3px; position:relative; overflow:hidden;}
  .abar .mid{position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--baseline);}
  .abar .fill{position:absolute; top:0; bottom:0; border-radius:2px;}
  .actor-row .sc{font-family:var(--mono); font-size:10.5px; text-align:right;}

  /* seats bar */
  .seatbar{height:14px; border-radius:4px; display:flex; background:var(--surface3); position:relative; margin:3px 0 6px;}
  .seatbar .seg{height:100%;}
  .seatbar .seg:first-child{border-radius:4px 0 0 4px;}
  .seatbar .tick{position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink2); opacity:.75; cursor:help;}
  .seatbar .tick.two{background:var(--warn);}
  .threshold-note{font-size:10px; color:var(--muted); font-family:var(--mono);}

  /* sparkline rows */
  .issue-row{display:grid; grid-template-columns:1fr 74px 74px; gap:6px; align-items:center; padding:2px 0;}
  .issue-row .inm{font-size:11.5px;}
  .issue-row svg{display:block;}
  .issue-row .ival{font-family:var(--mono); font-size:11px; color:var(--ink); text-align:right;}
  .capbar{height:8px; border-radius:3px; background:var(--surface3); overflow:hidden; position:relative;}
  .capbar .fill{height:100%; border-radius:3px;}
  .capbar .capline{position:absolute; top:0; bottom:0; width:2px; background:var(--critical);}

  /* feed */
  .feed-item{border:1px solid var(--grid); border-left:3px solid var(--baseline); border-radius:6px;
    background:linear-gradient(180deg,#1c1c1b,var(--surface)); padding:10px 14px; margin-bottom:8px;
    box-shadow:0 1px 6px rgba(0,0,0,.22); transition:border-color .15s;}
  .feed-item:hover{border-color:rgba(255,255,255,.16);}
  .feed-item.src-CalMatters{border-left-color:var(--yellow);}
  .feed-item.src-LAO{border-left-color:var(--blue);}
  .feed-item.src-PPIC{border-left-color:var(--aqua);}
  .feed-item.src-Politico{border-left-color:var(--magenta);}
  .feed-item.src-AP{border-left-color:var(--ink2);}
  .feed-item.src-WALL{border-left-color:var(--critical); background:#201616;}
  .feed-item.src-SYSTEM{border-left-color:var(--violet);}
  .feed-item .src{font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:flex; justify-content:space-between; align-items:center;}
  .feed-item .src .chip{padding:1px 7px; border-radius:9px; background:rgba(255,255,255,.05); border:1px solid var(--ring);}
  .feed-item .hl{color:var(--ink); font-weight:700; font-size:15.5px; margin:5px 0 5px; line-height:1.28; font-family:var(--serif); letter-spacing:.002em;}
  .feed-item .bd{font-size:12.5px; color:var(--ink2); white-space:pre-wrap; line-height:1.52;}
  .feed-item.src-WALL .hl{font-style:italic;}
  .feed-item.src-WALL .bd{font-family:var(--serif); font-size:13px; font-style:italic; color:#d8cfc4;}
  .feed-item .modelnote{margin-top:7px; border-top:1px dashed var(--baseline); padding-top:5px;
    font-family:var(--mono); font-size:10.5px; color:#b0a5e6;}

  /* inbox */
  .inbox-item{display:flex; gap:8px; align-items:baseline; padding:3px 0; border-bottom:1px dotted var(--grid); font-size:12px;}
  .inbox-item .due{font-family:var(--mono); font-size:10px; color:var(--warn); white-space:nowrap;}

  /* promises */
  .promise{border:1px solid var(--grid); border-radius:6px; padding:7px 9px; margin-bottom:7px; background:var(--surface2);}
  .promise .pt{color:var(--ink); font-size:12px; font-weight:600;}
  .promise .pstat{font-family:var(--mono); font-size:10.5px; margin-top:2px;}
  .pbar{height:5px; background:var(--surface3); border-radius:3px; margin-top:4px; overflow:hidden;}
  .pbar .fill{height:100%; background:var(--blue);}

  /* actions */
  .actionbar{position:sticky; bottom:0; z-index:50; background:rgba(13,13,13,0.97); border-top:1px solid var(--grid);
    padding:8px 4px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:6px;}
  .slots{font-family:var(--mono); color:var(--ink); font-size:13px;}
  .slots .used{color:var(--muted);}
  .acat{margin-bottom:10px;}
  .acat h4{font-size:10px; text-transform:uppercase; letter-spacing:.11em; color:var(--muted); margin-bottom:5px;}
  .agrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:6px;}
  .abtn{text-align:left; padding:7px 9px; display:block; width:100%;}
  .abtn .an{color:var(--ink); font-size:12px; font-weight:600; display:block;}
  .abtn .ac{font-family:var(--mono); font-size:10px; color:var(--muted);}
  .abtn.gated .an{color:var(--muted);}
  .abtn.wallbtn{border-color:#4a2626;}

  /* modal */
  .modal-back{position:fixed; inset:0; background:rgba(0,0,0,0.64); backdrop-filter:blur(3px); z-index:100; display:flex; align-items:center; justify-content:center; padding:18px;}
  .modal{background:linear-gradient(180deg,#1e1e1d,var(--surface)); border:1px solid var(--ring); border-radius:12px; max-width:660px; width:100%;
    max-height:86vh; overflow-y:auto; padding:18px 20px; box-shadow:0 18px 60px rgba(0,0,0,.55);}
  .modal h2{font-size:16px; margin-bottom:8px; border-bottom:1px solid var(--grid); padding-bottom:7px;}
  .choice{display:block; width:100%; text-align:left; margin-bottom:7px; padding:9px 11px;}
  .choice .cn{color:var(--ink); font-weight:600; display:block; font-size:13px;}
  .choice .cd{display:block; font-size:11.5px; color:var(--ink2);}
  .choice .cc{display:block; font-family:var(--mono); font-size:10px; color:var(--warn);}

  /* creation */
  .creation{max-width:980px; margin:24px auto;}
  .creation .step-h{display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--grid); padding-bottom:8px; margin-bottom:14px;}
  .creation h1{font-size:20px; letter-spacing:.02em;}
  .creation .steps{font-family:var(--mono); font-size:11px; color:var(--muted);}
  .cardgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:10px;}
  .card{background:linear-gradient(180deg,#1d1d1c,var(--surface)); border:1px solid var(--grid); border-radius:9px;
    padding:12px 14px; cursor:pointer; transition:border-color .12s, transform .1s, box-shadow .12s;}
  .card:hover{border-color:rgba(255,255,255,0.3); transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.35);}
  .card.sel{border-color:var(--blue); background:linear-gradient(180deg,#182333,#141d2a); box-shadow:0 0 0 1px var(--blue), 0 4px 18px rgba(57,135,229,.18);}
  .card .flavor{font-family:var(--serif);}
  .card h4{font-size:13.5px; margin-bottom:2px;}
  .card .flavor{font-style:italic; color:var(--muted); font-size:11.5px; margin-bottom:6px;}
  .attr-line{display:flex; gap:5px; flex-wrap:wrap; font-family:var(--mono); font-size:10.5px; margin:5px 0;}
  .attr-line span{background:var(--surface3); padding:1px 5px; border-radius:3px;}
  .feat{font-size:11.5px; margin:3px 0;}
  .feat b{color:var(--aqua); font-weight:600;}
  .liab b{color:var(--serious); font-weight:600;}
  .pointbuy{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:8px;}
  .pb-row{display:grid; grid-template-columns:1fr auto auto auto; gap:8px; align-items:center;
    background:var(--surface); border:1px solid var(--grid); border-radius:7px; padding:8px 11px;}
  .pb-row .an{font-size:12px;} .pb-row .anm{color:var(--ink); font-weight:600;}
  .pb-row .cur{font-family:var(--mono); font-size:17px; color:var(--ink); width:26px; text-align:center;}
  .pb-row button{width:28px; padding:3px 0; font-family:var(--mono);}
  .capnote{font-size:10.5px; color:var(--serious); font-style:italic; margin-top:2px;}
  .mandate-box{background:var(--surface); border:1px solid var(--grid); border-radius:8px; padding:16px 18px; margin-bottom:12px;}
  .wall-quote{border-left:3px solid var(--critical); padding:8px 12px; margin:8px 0; font-style:italic; color:var(--ink2); background:#1d1616; border-radius:0 6px 6px 0;}

  /* drawer */
  .drawer{border:1px dashed var(--baseline); border-radius:8px; padding:10px 12px; margin:10px 0; background:#171420;}
  .drawer summary{cursor:pointer; font-family:var(--mono); font-size:11px; color:#b0a5e6; letter-spacing:.08em;}
  .drawer li{margin:5px 0 5px 16px; font-size:11.5px;}
  details.acc summary{cursor:pointer; color:var(--ink2); font-size:12px; padding:3px 0;}

  .toast{position:fixed; bottom:70px; right:18px; background:var(--surface3); border:1px solid var(--ring);
    border-radius:8px; padding:10px 14px; z-index:200; max-width:340px; font-size:12.5px; color:var(--ink);
    box-shadow:0 6px 24px rgba(0,0,0,.5);}
  .pill{display:inline-block; padding:1px 7px; border-radius:9px; font-family:var(--mono); font-size:10px; border:1px solid var(--ring);}
  .setpiece{border:2px solid var(--yellow); border-radius:10px; padding:12px 14px; margin-bottom:10px;
    background:linear-gradient(180deg,#262010,#201b0e); box-shadow:0 0 26px rgba(201,133,0,.15), inset 0 1px 0 rgba(255,255,255,.04);}
  .setpiece h3{color:var(--yellow); border:none;}
  .wall-quote{font-family:var(--serif); font-size:13.5px; line-height:1.55;}
  .bill{border:1px solid var(--grid); border-radius:6px; padding:8px 10px; margin:7px 0; background:var(--surface);}
  .bill .bt{color:var(--ink); font-weight:600; font-size:12.5px;}
  .bill .bwho{font-size:10.5px; font-family:var(--mono); color:var(--muted); margin:2px 0;}
  .legend-note{font-size:10px; color:var(--muted); margin-top:4px;}
  a{color:var(--blue);}
  .footer-note{margin-top:26px; font-size:10.5px; color:var(--muted); font-family:var(--mono); text-align:center;}

  /* ---- v2: delta ticker (A4) ---- */
  .ticker{position:fixed; bottom:64px; left:16px; z-index:180; display:flex; flex-direction:column; gap:5px; pointer-events:none;}
  .tchip{font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:10px; border:1px solid var(--ring);
    background:var(--surface3); animation:chipin .35s ease-out; box-shadow:0 3px 12px rgba(0,0,0,.4);}
  .tchip.tg{color:#7dc87d; border-color:rgba(12,163,12,.4);} .tchip.tb{color:var(--red); border-color:rgba(230,103,103,.4);}
  @keyframes chipin{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  /* ---- number flash (A7) ---- */
  .flash-up{animation:fup 1.2s ease-out;} .flash-dn{animation:fdn 1.2s ease-out;}
  @keyframes fup{0%{color:var(--good);text-shadow:0 0 12px rgba(12,163,12,.6)}100%{}}
  @keyframes fdn{0%{color:var(--red);text-shadow:0 0 12px rgba(230,103,103,.6)}100%{}}
  /* ---- sparkline tooltip (A1) ---- */
  #sparktip{position:fixed; z-index:300; background:var(--surface3); border:1px solid var(--ring); border-radius:5px;
    padding:3px 8px; font-family:var(--mono); font-size:10.5px; color:var(--ink); pointer-events:none; display:none;
    box-shadow:0 4px 14px rgba(0,0,0,.45); white-space:nowrap;}
  [data-spark]{cursor:crosshair;}
  /* ---- feed filter chips (A5) ---- */
  .fchips{display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px;}
  .fchip{font-family:var(--mono); font-size:9.5px; padding:2px 8px; border-radius:9px; letter-spacing:.06em;}
  .fchip.on{background:#1c5cab; border-color:var(--blue); color:#fff;}
  /* ---- memo (F2) ---- */
  .memo{border-left:3px solid var(--yellow);}
  .memo-line{font-size:12.5px; padding:3px 0; border-bottom:1px dotted var(--grid);}
  .memo-line:last-child{border-bottom:none;}
  /* ---- tips (F3) ---- */
  .tip{display:flex; justify-content:space-between; align-items:center; gap:10px; background:#14201a;
    border:1px solid rgba(25,158,112,.4); border-radius:8px; padding:8px 12px; margin-bottom:8px; font-size:12px;}
  /* ---- budget builder (L5) ---- */
  .bb-row{display:grid; grid-template-columns:230px 1fr 58px; gap:10px; align-items:center; padding:5px 0;}
  .bb-row label{font-size:12px; color:var(--ink);}
  .bb-row input[type=range]{width:100%; accent-color:var(--blue);}
  .bbval{text-align:right; color:var(--yellow); font-size:13px;}
  .bb-preview{border:1px dashed var(--baseline); border-radius:8px; padding:9px 12px; margin-top:9px; background:var(--surface2);}
  .modal-wide{max-width:780px;}
  .keyhint{display:inline-block; font-family:var(--mono); font-size:9px; background:var(--surface3);
    border:1px solid var(--ring); border-radius:3px; padding:0 4px; color:var(--muted); vertical-align:1px;}
  /* ---- interstitial (A3/F7) ---- */
  .inter-hl{font-family:var(--serif); font-size:14px; color:var(--ink); padding:5px 0; border-bottom:1px dotted var(--grid); line-height:1.35;}
  /* ---- achievements (F8) ---- */
  .ach{border:1px solid rgba(201,133,0,.4); border-radius:8px; padding:8px 11px; background:#221d10; font-size:12px;}
  .ach b{color:var(--yellow);}
  /* ---- run ledger (F5) ---- */
  table.runs{width:100%; border-collapse:collapse; font-size:11.5px;}
  table.runs th{text-align:left; color:var(--muted); font-family:var(--mono); font-size:9.5px; text-transform:uppercase;
    letter-spacing:.08em; border-bottom:1px solid var(--grid); padding:3px 6px;}
  table.runs td{padding:4px 6px; border-bottom:1px dotted var(--grid);}
  .scard{padding:8px 11px;} .scard h4{margin-bottom:1px;}
  .urgent{border:1px solid rgba(250,178,25,.35); border-radius:8px; padding:8px 10px; background:#221d10;}
  /* ---- responsive (A9) ---- */
  @media(max-width:760px){
    #app{padding:6px 8px 120px;}
    .topbar{gap:10px; padding:6px 2px;} .topbar .brand{width:100%;}
    .tb-item .val{font-size:12.5px;} .tb-deadline{margin-left:0; width:100%; font-size:10.5px;}
    .cockpit{display:flex; flex-direction:column;}
    .col-mid{order:1;} .col-left{order:2;} .col-right{order:3;}
    .agrid{grid-template-columns:1fr;}
    .bb-row{grid-template-columns:1fr; gap:3px;}
    .actionbar{gap:5px;} .actionbar button{padding:6px 8px; font-size:11.5px;}
    .actor-row{grid-template-columns:96px 1fr 30px;}
    .modal{padding:12px;}
  }
  /* ---- v3: tabbed cockpit ---- */
  .tabbar{position:sticky; top:52px; z-index:55; display:flex; gap:8px; padding:10px 2px 12px;
    background:linear-gradient(180deg, rgba(13,13,13,0.97) 70%, rgba(13,13,13,0)); flex-wrap:wrap;}

/* ===================== 1. SEEDED RNG (mulberry32, snapshot-able state) ===================== */
/* D5: state lives ON the object so saves serialize {state, calls} directly — O(1) restore, no replay. */
const RNG={state:0,calls:0,
  init(seed){this.state=seed>>>0;this.calls=0;},
  restore(state,calls){this.state=state|0;this.calls=calls||0;},
  r(){this.calls++;this.state=(this.state+0x6D2B79F5)|0;
    let t=Math.imul(this.state^this.state>>>15,1|this.state);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;},
  int(min,max){return min+Math.floor(this.r()*(max-min+1));},
  pick(arr){return arr[Math.floor(this.r()*arr.length)];},
  chance(p){return this.r()<p;},
  norm(mu,sd){ // Box-Muller (one draw of two rolls)
    const u1=Math.max(this.r(),1e-9),u2=this.r();

/* ===================== 9. SCRIPTED CALENDAR NOTES (per §6) ===================== */
function nextDeadline(g){
  const t=g.turn,d=turnDate(t);
  const list=[];
  const yearsAhead=[d.y,d.y+1];
  for(const y of yearsAhead){
    const jan=(y-2027)*12+1, may=jan+4, jun=jan+5, aug=jan+7, sep=jan+8;
    if(jan>=t&&jan<=48)list.push(["Jan 10 — budget proposal due",jan]);
    if(may>=t&&may<=48)list.push(["May Revision",may]);
    if(jun>=t&&jun<=48)list.push(["Jun 15 — budget must pass",jun]);
    if(aug>=t&&aug<=48)list.push(["Aug 31 — session ends",aug]);
    if(sep>=t&&sep<=48)list.push(["Sep 30 — sign/veto deadline",sep]);
  }
  if(t<=22)list.push(["Nov 2028 — presidential + ballot measures",23]);
  if(t<=46)list.push(["Nov 2030 — your reelection",47]);
  list.sort((a,b)=>a[1]-b[1]);
  const nd=list.find(x=>x[1]>=t);
  return nd?{label:nd[0],inTurns:nd[1]-t}:{label:"End of term",inTurns:48-t};
}

/* Confirmed members average against the full 9 posts; a vacancy counts as an acting deputy (1.5★). */
function avgCabinetQ(g){
  const filled=g.cabinet.filter(c=>!c.pending);

}
Object.assign2=(t,src)=>{for(const[k,v]of Object.entries(src))t[k]=(t[k]||0)+v;};
function clampA(x){return Math.max(-100,Math.min(100,Math.round(x)));}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}

function computeMandate(g,bg){
  const p=g.player,A=p.attrs;
  let m = (p.party==="D"?11:p.party==="R"?1.5:3.5);
  m += (A.CHA-5)*0.9 + Math.log10(Math.max(p.chest,1))*1.3;
  m += (bg.approvalMod||0)*0.25;
  if(bg.fieldArmy)m+=1.5;
  m += RNG.norm(0,2.6);
  m = Math.round(clamp(m,0.4,26)*10)/10;
  p.margin=m;
  let pc, note;
  if(m<2){pc=30;note="Nobody thinks you have a mandate. Including your own caucus.";}
  else if(m<6){pc=45;note="A normal, unremarkable win.";}
  else if(m<12){pc=60;note="Comfortable.";}
  else if(m<20){pc=75;note="You have leverage and a window.";}
  else{pc=90;note="A genuine mandate. It will last about eight months.";}
  if(bg.pcMult)pc=Math.round(pc*bg.pcMult);
  g.pc=pc; p.mandateNote=note;
  g.approval=clamp(Math.round(49+m*0.45+(bg.approvalMod||0)),33,64);
  // coalition consistency
  if(p.party==="R"&&m>=6){p.coalition="Your coalition includes moderate Democrats and independents who will punish you the moment you govern as a partisan.";
    g.actors.mods=clampA(g.actors.mods+18); g.actors.progs=clampA(g.actors.progs+6); g.flags.crossoverCoalition=true;}
  else if(p.party==="R")p.coalition="A base-plus-frustration coalition. Narrow, angry, and watching.";
  else if(p.party==="D"&&m>=12)p.coalition="A broad coalition — labor, coastal professionals, and enough of the Valley to claim the whole map.";
  else if(p.party==="D")p.coalition="The standard Democratic coalition, with soft spots among renters and the inland counties.";
  else p.coalition="An anti-party coalition of the exhausted middle. It expects miracles and belongs to no one — including you.";
}

/* ===================== 12. RESOLUTION CORE ===================== */
function effAttr(g,key,ctx){
  let v=g.player.attrs[key];
  const bg=g.player.bg;
  if(key==="FIS"&&bg==="leg"&&ctx==="trailer")v+=2;
  if(key==="FIS"&&bg==="tech"&&ctx==="deficit")v+=2;
  if(key==="OPR"&&bg==="mayor"&&g.flags.emergency)v+=2;
  return Math.min(v,11);
}
function roll(g,attr,diff,mods,ctx){
  let p=0.22+effAttr(g,attr,ctx)*0.055+(mods||0)-diff;
  if(g.honeymoon>0)p+=0.06;
  if(g.flags.transitionMalus>0)p-=0.10;
  if(attr==="OPR")p+=(avgCabinetQ(g)-2)*0.05; // R2: cabinet quality moves operational rolls; vacancies bite
  if(g.flags.frameBonus){p+=0.15;g.flags.frameBonus=false;} // MECH-1: DOMINATE THE CYCLE's tailwind, real now
  p+=clamp((g.approval-48)/300,-0.05,0.05);
  p=clamp(p,0.04,0.95);
  const r=RNG.r();
  const res={ok:r<p, p, r, margin:p-r};
  g.rollLog.push({t:g.turn,attr,p:Math.round(p*100)/100,r:Math.round(r*100)/100,ok:res.ok}); // D10
  if(g.rollLog.length>20)g.rollLog.shift();
  return res;
}
function dAct(g,id,d){if(g.actors[id]===undefined)return;
  // promise betrayal doubling
  let mult=1;
  for(const pid of g.player.promises){const pr=PROMISES.find(x=>x.id===pid);
    if(pr.cons===id&&d<0)mult=2;}
  if(d<0&&(id==="cta"||id==="cft")&&g.player.bg==="labor"&&!g.flags.p98ShieldBurned&&g._eduCut){
    if(!g.flags.p98ShieldUsed){mult=0.5;g.flags.p98ShieldUsed=true;
      cov(g,"Politico","Labor gives its own a pass — once","The teachers' unions swallowed an education hit they would have gone to war over under any other governor. Union sources say the credit is now spent.");}
    else mult=2;
  }
  g.actors[id]=clampA(g.actors[id]+d*mult);
}
function dAp(g,d){
  const bg=BACKGROUNDS.find(b=>b.id===g.player.bg);
  if(d>0&&g._pulpit&&bg.id==="media")d*=1.6;
  if(d<0&&bg.id==="fed"&&g._frameAttack)d*=1.5;
  if(d<0&&bg.id==="ltgov"&&g._recordAttack)d*=1.5;
  g.approval=clamp(Math.round((g.approval+d)*10)/10, (bg.floorMod?18+bg.floorMod:18), 88);
}
/* R1/R3: every queued effect carries a human label and attribution. */
const FX_LABELS={deficit:"Fiscal effect",rev:"Revenue translation (market → treasury)",actor:"Political reaction",
  issue:"Policy effect propagating",cov:"Story developing",approval:"Public-opinion effect",insur:"Insurance-market effect",
  grid:"Grid procurement pipeline",fn:"Process underway"};
function queue(g,dueIn,fx,label,causedBy){
  g.lag.push({due:g.turn+dueIn,fx,label:label||FX_LABELS[fx.k]||"Pending effect",by:causedBy||"world"});
}
function spendPC(g,n){g.pc=Math.max(0,g.pc-n);}
function spendSlots(g,n){g.slots-=n;}

/* apply a lag effect (entry = {fx,label,by} or bare fx for legacy) */
function applyFx(g,fx,label,by){
  const yours=by==="you";
  const mark=(key)=>{if(yours&&g.markers[key]){g.markers[key].push({t:g.turn,label});}};
  if(label)g.landedLog.push({t:g.turn,label,by:by||"world"});
  if(g.landedLog.length>120)g.landedLog.shift();
  switch(fx.k){
    case "deficit":g.fiscal.deficit=Math.max(0,g.fiscal.deficit+fx.d);break;
    case "rev":{ // Revenue surprise waterfall — the whole Prop 98/Prop 2 lesson in one function.
      const d=fx.d, F=g.fiscal;
      const p98=d*TUNING.P98_SHARE;
      F.prop98=Math.max(90,F.prop98+p98);
      if(d<0){ // downturn: guarantee falls, but a maintenance-factor IOU is born
        F.maintFactor+=Math.abs(p98)*0.5;
        F.deficit=Math.max(0,F.deficit-d*(1-TUNING.P98_SHARE)); // 60% of the pain lands on you
      }else{   // windfall: schools first, old IOUs second, the vault third, you last
        let remaining=d*(1-TUNING.P98_SHARE);
        if(F.maintFactor>0.1){ // D3: repayment bites before you see a dollar
          const pay=Math.min(F.maintFactor,d*TUNING.MF_REPAY_SHARE);
          F.maintFactor=Math.max(0,F.maintFactor-pay);remaining-=pay;
          cov(g,"LAO","The good year already belongs to the schools",
            `Receipts improved — and ${fmtB(pay)} of the improvement went straight to repaying the Prop 98 maintenance factor before a dollar reached anything else. This is the mechanism working as the voters wrote it in 1988: underfund the guarantee in a bad year and the recovery arrives pre-spent. The remaining discretionary benefit is ${fmtB(Math.max(remaining,0))}.`);
        }
        const dep=Math.min(d*TUNING.BSA_DEPOSIT_SHARE, Math.max(0,TUNING.BSA_CAP-F.bsa)); // L3: Prop 2 deposit
        if(dep>0.2){F.bsa+=dep;F.resLao+=dep;F.resAdmin+=dep;remaining-=dep;
          if(dep>1)cov(g,"CalMatters","Prop 2 skims the windfall into the vault",
            `${fmtB(dep)} of the revenue surprise auto-deposited to the rainy-day fund — no vote, no discretion, the 2014 formula doing what it does. The BSA now holds ${fmtB(F.bsa)} against a cap of ~${fmtB(TUNING.BSA_CAP,0)}. You cannot spend it without declaring an emergency. That is the point of it.`);}
        g.flags.gann=Math.max(-6,g.flags.gann-d*0.25); // L7: booms eat appropriations-limit headroom
        if(g.flags.gann<0&&!g.flags.gannTripped){g.flags.gannTripped=true;
          const excess=Math.abs(g.flags.gann);
          F.deficit=Math.min(F.deficit+excess*0.5,99);
          cov(g,"LAO","The Gann limit trips — the surplus is spoken for",
            `Tax-funded appropriations have exceeded the Prop 4 (1979) limit. The excess — roughly ${fmtB(excess)} — must by constitution be split between taxpayer rebates and schools. The windfall you were planning around is now a check with two other names on it. Last seen operating at scale: 1987, and again in the 2022 rebate round.`,
            "MODEL NOTE: Gann headroom uses an $8B placeholder starting value — UNVERIFIED (DOC §6.8 has no clean figure).");}
        F.deficit=clamp(F.deficit-Math.max(remaining,0),-18,99); // REAL-5: a boom can flip you into SURPLUS
        if(F.deficit<-1&&!g.flags.surplusNoted){g.flags.surplusNoted=true;
          cov(g,"LAO","The word the office almost never prints: surplus",
            "Modeled revenues now exceed modeled spending — an operating surplus, the first since the COVID-era windfalls. The office's obligatory caveats, in order: it is one-time money wearing an ongoing costume; the Gann limit is watching; every interest group in the building has already spent it twice; and the structural drift (+5.8% spending vs +4% revenue) resumes eating it in January. Enjoy the adjective. Do not furnish the house with it.");}
      }
      if(fx.cov)cov(g,fx.cov.src,fx.cov.hl,fx.cov.bd,fx.mn);
      break;}
    case "actor":dAct(g,fx.id,fx.d);break;
    case "issue":{g.issues[fx.key]=(g.issues[fx.key]||0)+fx.d;
      const m={homelessBoost:"homeless",housingBoost:"housing",insurBoost:"insur",medicalBoost:"medical"}[fx.key];
      if(m)mark(m);break;}
    case "law":{g.issues[fx.key]=(g.issues[fx.key]||0)+fx.d; // ACT-2: statutory effects land once and never decay
      const lm={lawHomeless:"homeless",lawHousing:"housing",lawInsur:"insur",lawMedical:"medical"}[fx.key];
      if(lm)mark(lm);break;}
    case "cov":cov(g,fx.src,fx.hl,fx.bd,fx.mn);break;
    case "approval":dAp(g,fx.d);break;
    case "insur":g.issues.insur=clamp(g.issues.insur+fx.d,0,100);mark("insur");break;
    case "grid":g.issues.grid=clamp(g.issues.grid+fx.d,5,30);mark("grid");break;
    case "fn":LAG_FNS[fx.fn]&&LAG_FNS[fx.fn](g,fx);break;
  }
}
const LAG_FNS={
  insurer_exit(g){g.issues.insur=clamp(g.issues.insur-7,0,100);
    cov(g,"CalMatters","Two more carriers pause new homeowners policies",
      "The pattern is familiar by now: a fire season, a FAIR Plan assessment, an actuarial memo, and a market that gets smaller. The FAIR Plan — the insurer of last resort — absorbs the growth, which concentrates exactly the risk it was built to diffuse.");},
};

/* ===================== 13. MARKET & FISCAL WEATHER ===================== */
function stepMarket(g){
  const M=g.market;
  if(M.mode==="exuberant"){
    M.hazard+=TUNING.HAZARD_RAMP;
    M.idx*=1+RNG.norm(TUNING.DRIFT_EXUBERANT,TUNING.VOL_EXUBERANT);
    if(RNG.chance(M.hazard)){
      M.mode="correction";M.corrLeft=RNG.int(4,8);
      M.corrRate=(0.25+RNG.r()*0.15)/M.corrLeft;
      g.flags.marketCorrected=true;
      M.eras.push({start:g.turn}); // A2: era shading
      cov(g,"AP","Markets: the air comes out of the AI trade",
        "A broad selloff hit technology names this month, and this time the dip-buyers did not show up. Analysts who spent two years explaining why valuations made sense are now explaining why they never said that. The Legislative Analyst's Office declined to gloat, which somehow made it worse.",
        "MODEL NOTE: The %-equity-drawdown → $-revenue elasticity is not published anywhere; the LAO says only that a significant decline 'would reduce state revenues by tens of billions.' This engine uses a placeholder (~$11B/yr per sustained 10% drawdown, landing over 3–18 months). RESEARCH DOC §6.8.");
    }
  }else if(M.mode==="correction"){
    M.idx*=1-(M.corrRate+RNG.norm(0,0.02));
    if(--M.corrLeft<=0){M.mode="trough";M.troughLeft=RNG.int(3,8);
      g.issues.unemp=clamp(g.issues.unemp+0.4,3,12);}
  }else if(M.mode==="trough"){
    M.idx*=1+RNG.norm(0,0.015);
    g.issues.unemp=clamp(g.issues.unemp+0.12,3,12);
    if(--M.troughLeft<=0){M.mode="recovery";
      const era=M.eras[M.eras.length-1];if(era&&!era.end)era.end=g.turn;}
  }else{ // recovery
    M.idx*=1+RNG.norm(0.013,0.02);
    g.issues.unemp=clamp(g.issues.unemp-0.08,3.5,12);
    if(M.idx>=M.peak*0.98){M.mode="exuberant";M.hazard=0.012;}
  }
  M.peak=Math.max(M.peak,M.idx);
  M.hist.push(M.idx);
  // REAL-6: CalPERS/CalSTRS hold the same equities the AI trade inflated — the unfunded liability breathes with the index
  if(M.mode==="correction")g.fiscal.pension=clamp(g.fiscal.pension+1.1,200,330);
  else if(M.mode==="trough")g.fiscal.pension=clamp(g.fiscal.pension+0.5,200,330);
  else if(M.mode==="recovery")g.fiscal.pension=clamp(g.fiscal.pension-0.55,200,330);
  else g.fiscal.pension=clamp(g.fiscal.pension-0.1,200,330);
  // quarterly revenue translation (3–18 mo lag, staged, INCREMENTAL vs what's already applied)
  if(g.turn%3===0&&M.hist.length>12){
    const ago=M.hist[M.hist.length-13];
    const pct=(M.idx/ago-1)*100;
    const devTarget=clamp((pct-TUNING.REV_EXPECTED_12M)*TUNING.ELASTICITY_PER_PCT,TUNING.REV_DEV_MIN,TUNING.REV_DEV_MAX);
    // REAL-ECON-1: capital gains arrive with April filings — the April window translates bigger and faster.
    // "Mostly in April, sometimes not at all" — the LAO's deputy, above. This is the mechanism.
    const april=g.turn%12===3;
    const surprise=Math.round((devTarget-(M.revApplied||0))*(april?1.35:1)*10)/10;
    if(Math.abs(surprise)>2){
      M.revApplied=(M.revApplied||0)+surprise;
      const lagT=april?RNG.int(1,3):RNG.int(3,9);
      const isBad=surprise<0;
      queue(g,lagT,{k:"rev",d:surprise,mn:isBad&&!g.flags.marketNoteShown?"MODEL NOTE: revenue translation uses the placeholder elasticity — see MODEL NOTES drawer.":null,
        cov:{src:"LAO",hl:isBad?"Revenue update: collections fall below forecast":"Revenue update: collections beat forecast — most of it already spoken for",
        bd:isBad?`Personal income tax receipts came in roughly ${fmtB(Math.abs(surprise))} per year below the assumption baked into the enacted budget. About 40 cents of every lost dollar comes out of the Prop 98 guarantee automatically — which creates a maintenance-factor IOU to schools — and the rest lands on programs with no constitutional bodyguard.`
        :`Receipts are running about ${fmtB(surprise)} per year above forecast. Before the celebration: roughly 40–50 cents of each surprise dollar is auto-committed to Prop 98 and Prop 2 reserves. Closing a $30 billion problem takes about $60 billion of good news. The problem is $35 billion.`}});
      if(isBad)g.flags.marketNoteShown=true;
    }
  }
}
/* ===================== 13b. VOTE MODEL (L2) — one count for display AND resolution ===================== */
/* Blocs: each Democratic caucus splits progressive/moderate (TUNING.PROG_BLOC); support share is a
   function of bloc standing + leadership standing. `noise` adds the seeded floor-day variance;
   display calls omit it so the number you see is the expected count the engine actually uses. */
function voteModel(g,noise,opts){
  opts=opts||{};
  const L=g.leg;
  const aP=Math.round(L.asmD*TUNING.PROG_BLOC),aM=L.asmD-aP;
  const sP=Math.round(L.senD*TUNING.PROG_BLOC),sM=L.senD-sP;
  const sh=st=>clamp(0.53+st/140+g.legStanding/400+(g.player.attrs.INS-5)*0.012,0.05,0.97);
  const gsh=st=>opts.tax?clamp(0.02+st/400,0.01,0.15):clamp(0.22+st/160,0.02,0.85);
  let asm=aP*sh(g.actors.progs)+aM*sh(g.actors.mods)+L.asmR*gsh(g.actors.gop);
  let sen=sP*sh(g.actors.progs)+sM*sh(g.actors.mods)+L.senR*gsh(g.actors.gop);
  if(opts.bonusSeats){asm+=opts.bonusSeats;sen+=opts.bonusSeats/2;}
  if(noise){asm+=RNG.int(-4,4);sen+=RNG.int(-2,2);}
  return {asm:Math.round(clamp(asm,0,L.asmD+L.asmR)),sen:Math.round(clamp(sen,0,L.senD+L.senR))};
}

/* ===================== 13c. CABINET STAFFING (transition + vacancies) ===================== */
/* One function serves the turn-1 transition set-piece AND later vacancy fills — how it actually works:
   you name a specific person to a specific post, and Senate Rules has opinions about some of them. */
function cabinetVacancies(g){return AGENCIES.filter(([c])=>!g.cabinet.find(x=>x.agency===c));}
function transitionPick(g,code,type){
  const i=AGENCIES.findIndex(a=>a[0]===code);
  if(i<0||g.cabinet.find(c=>c.agency===code))return null;
  const full=AGENCIES[i][1];
  const noBench=g.player.bg==="media";
  const cand=cabCand(code,type);
  const q=Math.max(1,cand.q-(noBench?1:0));
  const member={nm:cand.nm,agency:code,agencyFull:full,q,type,tag:cand.tag,bio:cand.bio,perk:cand.perk,fx:cand.fx,risk:cand.risk||0};
  if(type==="holdover"){
    g.cabinet.push(member);
    applyCandFx(g,cand); // the signal of the pick: constituencies read the résumé
    if(!g.transitionOpen)cov(g,"Politico",`${cand.nm} keeps the lights on at ${full}`,
      `A holdover pick — ${cand.tag}. ${cand.bio} Instant confirmation, institutional memory, and no debts in either direction. The building's safest currency.`);
  }else if(type==="ally"){
    g.cabinet.push(member);
    applyCandFx(g,cand);
    g.legStanding+=2;g.flags.committeeChit=true;
    if(!g.transitionOpen)cov(g,"Politico",`A confirmable choice: ${cand.nm} to ${full}`,
      `${cand.tag} — ${cand.bio} Senate Rules scheduled the hearing before the press release finished sending. The building rewards those who staff it with its own — and a chair now owes you a courtesy on your next bill.`);
  }else{ // reformer — Senate Rules gets 2 months and a veto in practice; the fx fire only if the nominee survives
    g.cabinet.push({...member,pending:true});
    queue(g,2,{k:"fn",fn:"_confirm",code},`Senate Rules: confirmation of ${cand.nm} (${code})`,"you");
  }
  return cand.nm;
}
function transitionDeadline(g){ // end of March: acting deputies become caretakers, ready or not
  if(!g.transitionOpen)return;
  g.transitionOpen=false;
  const vac=cabinetVacancies(g);
  if(vac.length){
    for(const [code,full] of vac)g.cabinet.push({nm:"A caretaker",agency:code,agencyFull:full,q:1,type:"caretaker"});
    cov(g,"CalMatters",`The transition ends with ${vac.length} caretaker${vac.length>1?"s":""}`,
      `March closed with ${vac.length} of the nine agency posts never formally filled — so the acting deputies became permanent-acting, the Capitol's saddest job title. ${vac.map(v=>v[1]).join(", ")} will run on autopilot (★, and it shows in every operational roll) until you FILL A CABINET VACANCY. Administrations are hired in January and judged in July; yours is now late to its own judging.`);
  }else{
    cov(g,"AP","The administration is staffed",
      `All nine agency posts filled inside the transition window: ${g.cabinet.filter(c=>!c.pending).length} confirmed${g.cabinet.some(c=>c.pending)?", "+g.cabinet.filter(c=>c.pending).length+" still before Senate Rules":""}. The org chart is real now. So is the accountability.`);
  }
}

/* ===================== 14. TURN LOOP ===================== */
function endMonth(g){
  const d=turnDate(g.turn);
  g._pulpit=false;
  g._feedMark=g.feed.length; // A3: count stories generated this resolution
  // 0. F1: an undecided situation card resolves itself — indecision is a choice
  if(g.pendingCard){
    const card=CARDS.find(c=>c.id===g.pendingCard.id);
    if(card){const opt=card.opts[card.dflt||0];
      opt.fx(g);
      cov(g,"Politico",`While you decided, it decided: ${card.t.toLowerCase()}`,
        `The situation on your desk resolved itself along the path of least resistance — "${opt.l}," by default rather than by decision. The Capitol keeps score on indecision too; it just files it under a different column.`);
      dAp(g,-0.3);}
    g.pendingCard=null;
  }
  // 1. lag queue lands (with labels + attribution — R1/R3)
  const due=g.lag.filter(l=>l.due<=g.turn); g.lag=g.lag.filter(l=>l.due>g.turn);
  for(const l of due)applyFx(g,l.fx,l.label,l.by);
  // 1b. an unsigned budget signs itself at the deadline — reluctantly, on the record
  if(g.fiscal.budget.awaiting)finishEnactment(g,true);
  // 2. unresolved desk bills become law without signature (Sept 30 rule; urgency bills after one month on the desk)
  const autoEnact=g.bills.desk.filter(b=>d.m===9||b.urgent);
  if(autoEnact.length){
    for(const b of autoEnact){
      enactBill(g,b,"sign",true);
      cov(g,"CalMatters",`${b.num} becomes law without the governor's signature`,
        `${g.player.name} let the deadline pass. Under the Constitution the bill becomes law anyway — a signature withheld is a statement, not a veto. Both sides noticed.`);
    }
    g.bills.desk=g.bills.desk.filter(b=>!autoEnact.includes(b));
  }
  // 2b. MISS-4: urgency bills get monthly floor votes — 2/3 for immediate effect, no waiting for August
  for(const b of g.bills.pipeline.filter(x=>x.urgent&&x.stage==="floor")){
    const v=voteModel(g,true,{bonusSeats:b.whip||0}); // LEG-3: whipped votes count monthly too
    if(v.asm>=54&&v.sen>=27){b.stage="passed";b.floorVotes=v;g.bills.desk.push(b);
      cov(g,"AP",`URGENCY: ${b.num} clears two-thirds — ${v.asm}–${79-v.asm}, ${v.sen}–${40-v.sen}`,
        `An urgency statute takes effect the moment it's signed — no waiting for January 1. The price is the supermajority you just spent: 54 and 27, counted in public. ${b.t} is on your desk NOW, and its effects follow within weeks, not quarters.`);}
    else{b.urgentTries=(b.urgentTries||0)+1;
      if(b.urgentTries>=3){billDied(g,b,"urgency failed 3×");
        cov(g,"Politico",`${b.num} gives up on urgency — ${v.asm} of 54`,
          `Three floor runs at two-thirds, three misses. The urgency clause comes off and the bill dies with it; the calendar wins again.`);}}
  }
  g.bills.pipeline=g.bills.pipeline.filter(b=>b.stage!=="dead");
  // 3. scheduled beats
  scheduledEvents(g,d);
  // 4. market weather
  stepMarket(g);
  // 5. issue drift
  driftIssues(g,d);
  // 6. random events
  randomEvents(g,d);
  // 7. plural executive autonomous turns
  pluralExecutive(g,d);
  // 8. actor threshold behaviors
  actorBehaviors(g,d);
  // 8b. SHELF-5: signature drives grind monthly — visible, slow, and subject to the calendar
  for(const m of g.measures.pending)if(m.gathering){
    m.sigsGot+=Math.round(m.rate*1000*(1+RNG.norm(0,0.08)));
    if(m.sigsGot>=m.sigs){
      m.gathering=false;m.sigsGot=m.sigs;
      const eTurn=g.turn<=21?23:47;m.electionTurn=eTurn;
      dAp(g,0.5);
      cov(g,"AP",`${m.t} QUALIFIES for the ${eTurn===23?"November 2028":"November 2030"} ballot`,
        `${m.sigs.toLocaleString()} valid signatures cleared county verification — ${g.turn-m.startTurn} months of clipboards, at a blended cost the campaign will not itemize. At 25% of signatures the Legislature got its mandatory hearing; it could not amend or block the measure, a fact members recite like a grievance. The opposition committees filed the same afternoon.`);}
    else if(g.turn-m.startTurn>=7){ // the 180-day clock is real
      m.dead=true;
      cov(g,"Politico",`The 180-day clock kills "${m.t}" at ${Math.round(m.sigsGot/m.sigs*100)}% of signatures`,
        "The county registrars stopped accepting petitions at the deadline and the drive was short. The money is spent; the measure is not qualified; the vendors have already re-priced the next attempt. The clock, unlike the coalition, never wavers.");}
  }
  g.measures.pending=g.measures.pending.filter(m=>!m.dead);
  // 9. approval drift toward fundamentals
  driftApproval(g);
  // 10. PC regen — PC-1: quiet months bank capital. Unused slots read as restraint, and
  // restraint reads as strength; a governor who isn't asking for anything accumulates chits.
  let regen=TUNING.PC_REGEN_BASE+Math.round((g.approval-45)/8);
  if(g.honeymoon>0){regen+=2;g.honeymoon--;}
  if(g.slots>=2)regen+=2;else if(g.slots===1)regen+=1;
  g.pc=clamp(g.pc+clamp(regen,1,9),0,110);
  if(g.flags.transitionMalus>0)g.flags.transitionMalus--;
  if(g.flags.weakened&&g.turn>g.flags.weakened.until)g.flags.weakened=null; // R4 decay
  if(g.transitionOpen&&g.turn>=3)transitionDeadline(g); // the transition window closes with March
  // 10b. R7: promise betrayal set-pieces — detect open → broken transitions
  for(const ps of promiseStates(g)){
    const prev=g.prevPromise[ps.id];
    if(prev&&prev!=="broken"&&ps.state==="broken"&&!g.promiseBrokenAt[ps.id]){
      g.promiseBrokenAt[ps.id]=g.turn;
      cov(g,"CalMatters",`BROKEN: "${ps.t}"`,
        `It is official enough for a headline now: the promise is gone. ${ps.cons} spent ${g.turn} months holding the receipt, and the penalty clause — betrayal at double — is already priced into every interaction you will have with them for the rest of the term. Campaign promises die in one of two ways in this state: loudly, by vote, or quietly, by arithmetic. Yours died the second way, which fools no one. The dashboard will carry the date.`);
      dAp(g,-2);
    }
    g.prevPromise[ps.id]=ps.state;
  }
  // 10c. F1: draw next month's situation card (quiet months get a dilemma)
  if(!g.over&&g.turn<47){
    const nm=(g.turn)%12+1; // month of NEXT turn
    const busy=(nm===1||nm===9);
    if(!busy&&!g.pendingCard&&RNG.chance(0.72)){
      const pool=CARDS.filter(c=>!g.cardHist.includes(c.id)&&c.w(g)>0);
      if(pool.length){
        let total=0;const weights=pool.map(c=>{total+=c.w(g);return total;});
        const pick=RNG.r()*total;
        const card=pool[weights.findIndex(w=>pick<w)]||pool[0];
        g.pendingCard={id:card.id};g.cardHist.push(card.id);
        if(g.cardHist.length>CARDS.length-4)g.cardHist=g.cardHist.slice(-8); // let old cards recycle late-game
      }
    }
  }
  // 11. failure checks
  failureChecks(g);
  // 12. history
  g.hist.approval.push(g.approval); g.hist.deficit.push(g.fiscal.deficit);
  g.hist.market.push(g.market.idx); g.hist.homeless.push(g.issues.homeless);
  g.hist.pc.push(g.pc); g.hist.insur.push(g.issues.insur);
  g.hist.housing.push(g.issues.housingCum); g.hist.medical.push(g.issues.mediCal); g.hist.unemp.push(g.issues.unemp);
  // 13. advance
  if(!g.over){
    g.turn++;
    if(g.turn>48){g.phase="report";buildLegacy(g);}
    else g.slots=3;
  }
  // deadline reminders
  g.inbox=g.inbox.filter(i=>g.turn-i.t<6);
}

function driftIssues(g,d){
  const I=g.issues,M=g.market;
  // ACT-1 homelessness: baseline pressure UP; only programs (decaying), statutes (permanent),
  // housing production, and mayors who actually implement push it down. No free wins.
  let hPct=TUNING.HOMELESS_BASE+(M.mode==="trough"||M.mode==="correction"?0.35:0)
    -(I.homelessBoost*0.085)-((I.lawHomeless||0)*0.05)-((I.housingBoost+(I.lawHousing||0))*0.006);
  if(g.actors.mayors>30)hPct-=0.06;
  I.homeless=Math.round(I.homeless*(1+hPct/100+RNG.norm(0,0.001)));
  // REAL-HML-1: programs SHELTER people before they house them — the unsheltered share moves first
  // and fastest (it's also what the public sees, so approval keys off it harder than off the count).
  I.unshelt=clamp((I.unshelt||66)+0.08-(I.homelessBoost*0.10)-((I.lawHomeless||0)*0.04),38,80);
  // SHELF-3: the count concentrates differently by region — LA's inflow is worst, the Bay's rents
  // are worst, the Valley has the least service capacity. A FOCUSED surge bends its region's share.
  {const S=I.hmlShares=I.hmlShares||{la:45,bay:25,val:30};
   const foc=g.flags.surgeFocus&&g.flags.surgeFocus.until>g.turn?g.flags.surgeFocus.reg:null;
   S.la+=0.012-(foc==="la"?0.25:0); S.bay+=0.004-(foc==="bay"?0.25:0); S.val+=-0.016-(foc==="val"?0.25:0);
   const tot=S.la+S.bay+S.val; S.la=S.la/tot*100; S.bay=S.bay/tot*100; S.val=S.val/tot*100;}
  I.homelessBoost=Math.max(0,I.homelessBoost-0.06); // MECH-4: programs fade unless renewed — statutes don't
  I.housingBoost*=0.99; // ACT-3: EO/program housing pushes fade slowly too; only law and production are forever
  // housing production (thousands/mo) — statutes + programs + the BCSH secretary's résumé
  I.housingRate=clamp(9.2*(1+(I.housingBoost+(I.lawHousing||0)+cabPerk(g,"housing"))/100)*(M.mode==="trough"?0.7:M.mode==="correction"?0.85:1),4,20);
  I.housingCum+=I.housingRate;
  // medi-cal glide toward 12M end-2029 under H.R.1 — L6: recessions push people ONTO the rolls
  let mcDrift=TUNING.MC_DRIFT+I.medicalBoost*0.02+(I.lawMedical||0)*0.02+cabPerk(g,"medical"); // APPT: CalHHS operator slows the churn
  if(M.mode==="trough"||M.mode==="correction"){mcDrift+=TUNING.MC_RECESSION;
    g.fiscal.deficit+=0.04; // CalFresh & caseload costs ride along
    if(!g.flags.mcRecessionNoted&&M.mode==="trough"){g.flags.mcRecessionNoted=true;
      cov(g,"CalMatters","The recession runs the eligibility system in reverse",
        "Medi-Cal enrollment is rising against the H.R.1 decline curve — every layoff feeds the caseload the federal law was shrinking. The cruel interaction, in one sentence: Washington cut the program's funding on the assumption of good times, and the times stopped being good. The state pays the difference, which is to say: you do.");}}
  I.mediCal=clamp(I.mediCal+mcDrift,11.5,15.2);
  I.medicalBoost=Math.max(0,I.medicalBoost-0.02);
  // prison: Prop 36 upward drift minus relief — statutes (credits, closures) relieve permanently
  I.prison=clamp(I.prison+TUNING.PRISON_DRIFT-((I.prisonRelief+(I.lawPrison||0))*0.09)-cabPerk(g,"prison")+RNG.norm(0,0.15),100,150);
  I.prisonRelief=Math.max(0,I.prisonRelief-0.02);
  // insurance stability — programs give a fading push; statutes repair the market a little every month
  I.insur=clamp(I.insur+clamp(I.insurBoost*0.22,0,3.2)+(I.lawInsur||0)*0.03-0.1,0,100); // MECH-5: big fixes now beat small ones
  I.insurBoost=Math.max(0,I.insurBoost-0.35);
  // grid: data-center & electrification demand growth erodes the planning margin every month;
  // procurement EOs and a CalEPA secretary who moves the permit queue (APPT perk) push back
  I.grid=clamp(I.grid-0.06+cabPerk(g,"grid"),5,30);
  // fire acres reset in Jan
  if(d.m===1)I.fireYtd=0;
}

function driftApproval(g){
  const I=g.issues,M=g.market;
  let fund=47;
  fund+=(M.mode==="exuberant"?2:M.mode==="recovery"?0:-4);
  fund-=(I.unemp-5.3)*1.6;
  fund+=(181934-I.homeless)/181934*30;
  fund-=((I.unshelt||66)-66)*0.05; // REAL-HML-1: the tents are what voters see, not the PIT spreadsheet
  fund+=(I.insur-38)/12;
  fund+=g.player.attrs.CHA*0.5;
  if(g.flags.jobKiller)fund-=2;
  const bg=BACKGROUNDS.find(b=>b.id===g.player.bg);
  const floor=22+(bg.floorMod||0);
  g.approval=clamp(Math.round((g.approval*0.85+fund*0.15)*10)/10,floor,88);
}

function failureChecks(g){
  const F=g.flags;
  if(g.approval<25)F.lowAp++;else F.lowAp=0;
  if(F.lowAp>=6&&!F.recallElection){F.recallElection=g.turn+3;
    cov(g,"AP","Recall petition hits the signature threshold",
      "The Secretary of State's office confirmed proponents have the signatures — 12 percent of the last vote for the office. Six straight months under 25 percent approval did the gathering for them. The election is set for "+turnDate(g.turn+3).long+".");}
  // recall pressure from existential actors
  let pressure=0;
  for(const id of MONEYED)if(g.actors[id]<=-60)pressure++;
  if(pressure>0&&g.approval<40){F.recallPressure=clamp(F.recallPressure+pressure*4,0,100);
    if(F.recallPressure>=100&&!F.recallElection){F.recallElection=g.turn+4;
      cov(g,"Politico","Recall qualifies — and this one is funded",
        "This was not organic. The committee's top donors are exactly who you think they are. Twelve percent of the last gubernatorial vote, bought at roughly $9 a signature, delivered in bankers boxes for the cameras.");}}
  else F.recallPressure=Math.max(0,F.recallPressure-2);
  if(F.recallElection&&g.turn>=F.recallElection){
    F.recallElection=0;
    const keep=clamp(0.30+(g.approval-38)*0.022+RNG.norm(0,0.05),0.05,0.95);
    if(RNG.r()<keep){cov(g,"AP",`${g.player.name} survives the recall`,
      "The 'no' side won. Survival is not vindication — ask Newsom, who won his recall by 24 points and spent the rest of the term being asked about it — but the office is still yours.");
      dAp(g,3);F.recallPressure=0;F.recallSurvived=true;}
    else{g.over=true;g.overReason="Recalled by the voters, "+turnDate(g.turn).long+".";g.phase="report";buildLegacy(g);}
  }
  if(F.contempt>=3){g.over=true;g.overReason="Held in federal contempt over the prison receivership. The term ends in a courtroom.";g.phase="report";buildLegacy(g);}
  if(g.fiscal.budget.late>=3&&!g.fiscal.budget.enacted){g.over=true;
    g.overReason="No budget past September. State workers on IOUs, White v. Davis payments only, and a Legislature that concluded you were the problem. Constitutional collapse.";

}

/* L1: the November 2028 legislative elections — the building changes under you */
function midterms2028(g){
  const P=g.player.party,L=g.leg;
  let swing=Math.round((g.approval-48)/4)+RNG.int(-2,2); // Assembly seats toward YOUR party
  if(P==="I")swing=RNG.int(-2,2);
  const oldAsmD=L.asmD,oldSenD=L.senD;
  const dDelta=(P==="R"?-swing:swing);
  L.asmD=clamp(L.asmD+dDelta,38,66);L.asmR=79-L.asmD;
  L.senD=clamp(L.senD+Math.round(dDelta/2),22,34);L.senR=40-L.senD;
  const dGain=L.asmD-oldAsmD;
  const hadSuper=oldAsmD>=54&&oldSenD>=27, hasSuper=L.asmD>=54&&L.senD>=27;
  let superLine="";
  if(hadSuper&&!hasSuper)superLine=" The headline underneath the headline: the Democratic supermajority is GONE. Every two-thirds threshold in the building — taxes, urgency statutes, Prop 98 suspension — now requires Republican votes that do not exist. The arithmetic of the next two years just changed species.";
  else if(!hadSuper&&hasSuper)superLine=" The supermajority is BACK. Two-thirds of both chambers again answers to one caucus, and the caucus knows it.";
  else if(hasSuper)superLine=" The supermajority holds. The two-thirds thresholds remain a Democratic family conversation.";
  cov(g,"CalMatters",`The Legislature you get for the back half: ${L.asmD}D–${L.asmR}R Assembly, ${L.senD}D–${L.senR}R Senate`,
    `Democrats ${dGain>0?"gained "+dGain:dGain<0?"lost "+Math.abs(dGain):"held their"} Assembly seats${dGain!==0?"":" exactly"}, in an election that operated — as legislative elections always do — partly as a referendum on the person in the horseshoe. Your ${g.approval.toFixed(0)} percent approval was on eighty ballots in invisible ink.${superLine} New members are sworn in December; committee assignments follow; every relationship you built has to survive the reshuffle.`);
  if(P==="D"&&dGain<-3)dAp(g,-1.5);
  if(P==="R"&&dGain<-3)dAp(g,1);
}

function reelection(g){
  const P=g.player;
  let score=(g.approval-46)*0.9;
  const kept=promiseStates(g).filter(p=>p.state==="kept").length;
  const broken=promiseStates(g).filter(p=>p.state==="broken").length;
  score+=kept*3-broken*3.5;
  score+=(P.party==="D"?5:P.party==="R"?-5:0);
  score+=(g.market.mode==="exuberant"||g.market.mode==="recovery"?2:-3);
  score+=P.attrs.CHA*0.5+Math.log10(Math.max(P.chest,1));
  score+=RNG.norm(0,3);
  const win=score>0;
  g.flags.reelection={win,score:Math.round(score*10)/10};
  if(win)cov(g,"AP",`${P.name} reelected`,
    `The margin was ${score>8?"comfortable — the race was called before the Central Valley finished counting, and the victory speech had the unhurried cadence of a candidate who had read the early vote":"narrow — the concession came after midnight, following three days in which every county registrar in the state trended on political Twitter"}. The exit polls told the usual California story: the coalition that won was not quite the coalition that governed, and both will present invoices. Four more years — and the structural deficit, which appeared on no ballot and conceded nothing, was re-elected too. It will be waiting in the January budget instructions, patient as arithmetic.`);
  else{cov(g,"AP",`${P.name} defeated`,
    "California hires optimists and fires realists, and it has never once made an exception for incumbents who explained the constraints correctly. The concession was gracious; the transition memo — the honest one, the one about the deficit and the receivers and the two reserve definitions — is already drafted, because the outgoing staff wrote the version they wish they had received. The deficit stays. It always stays. It is the only permanent employee of the office.");}
}

/* Live preview math shared by the builder UI and the engine — one source of truth. */
function budgetPreview(g,mx){
  const dofCred=cabPerk(g,"budget"); // APPT: a Finance director the LAO trusts makes the same numbers read better
  const cred=mx.cuts+mx.taxes*0.9+mx.reserves*0.8+mx.gimmicks*0.35+dofCred;
  const claimed=mx.cuts+mx.taxes+mx.reserves+mx.gimmicks+mx.rosy;
  const ratio=cred/Math.max(g.fiscal.deficit,1);
  let label,ap;
  if(mx.rosy>=10&&cred<6){label="F — the office has seen this movie";ap=-3;}
  else if(ratio>0.55){label=mx.taxes>0?"B+ — credible, if the votes exist":"A− — a serious document";ap=2;}
  else if(ratio>0.3){label="C+ — arithmetic present, courage partial";ap=0;}
  else{label="D — the gimmick share is the headline";ap=-2;}
  const costs=[];
  if(mx.cuts>=6)costs.push("CTA/education war ("+(mx.cuts>=6?"education is in the cuts":"")+")");
  else if(mx.cuts>=3)costs.push("SEIU, hospitals, progressives angered");
  if(mx.taxes>0)costs.push("CalChamber/tech war + a 2/3 vote you may not have");
  if(mx.gimmicks>=4)costs.push("new Prop 98 deferral → lawsuit, CTA betrayal");
  if(mx.rosy>=8)costs.push("LAO credibility loss; May Revision reckoning");
  if(mx.reserves>0)costs.push("SFEU drawdown (one-time money, annual problem)");
  return {cred,claimed,ratio,label,ap,costs,dofCred};
}
function proposeBudget(g,mx,templateNm){

  B.proposed=true;B.mix={...mx};B.solved=mx.cuts+mx.taxes+mx.reserves;

  if(mx.cuts>0){dAct(g,"seiu",-Math.round(mx.cuts*1.5));dAct(g,"progs",-Math.round(mx.cuts*1.3));
    dAct(g,"hosp",-Math.round(mx.cuts*1.1));dAct(g,"cft",-Math.round(mx.cuts*0.8));
    dAct(g,"chamber",Math.round(mx.cuts*1.0));dAct(g,"mods",Math.round(mx.cuts*0.7));dAct(g,"gop",Math.round(mx.cuts*0.5));

  }

    dAct(g,"chamber",-Math.round(mx.taxes*2.1));dAct(g,"tech",-Math.round(mx.taxes*1.2));dAct(g,"gop",-Math.round(mx.taxes*1.0));}
  if(mx.reserves>0){const draw=Math.min(mx.reserves,g.fiscal.sfeu);g.fiscal.sfeu-=draw;g.fiscal.resLao-=draw;g.fiscal.resAdmin-=draw;}

    ?"The Governor's Budget assumes the revenue surge that our November outlook described as resting on an 'overly exuberant' market will not merely persist but accelerate. We are obligated to note that hope is not a forecast, and that the structural gap does not appear in the document because it was not looked for."

    :pv.ratio>0.3?`About ${fmtB(pv.cred)} of credible solutions against a ${fmtB(g.fiscal.deficit)} problem, with the remainder assigned to deferrals, shifts, and assumptions we would characterize as seasonal. The structural gap survives this budget comfortably.`
    :"The document leans on deferrals and fund shifts to a degree the office has historically flagged, been ignored about, and then been quoted about three years later. We publish the flag now for efficiency.";
  B.grade={label:pv.label,text:laoText,ap:pv.ap};
  cov(g,"CalMatters",`Budget day: ${templateNm||"a portfolio of your own construction"}`,
    `${turnDate(g.turn).y===2027?"Six days into the job, ":""}${g.player.name} put numbers on the problem: ${fmtB(mx.cuts)} in cuts, ${fmtB(mx.taxes)} in revenue${mx.taxes>0?" (two-thirds required)":""}, ${fmtB(mx.reserves)} from reserves, ${fmtB(mx.gimmicks)} in maneuvers, and ${fmtB(mx.rosy)} of assumed growth — against a ${fmtB(g.fiscal.deficit)} structural gap. Constituency invoices${pv.costs.length?": "+pv.costs.join("; "):" pending"}. The LAO grades it in February; the subcommittees sharpen in spring.`);

function enactBudget(g,late){

      else{taxNote=` The revenue package died at two-thirds: ${tv.asm} of 54 in the Assembly, ${tv.sen} of 27 in the Senate. ${g.player.party==="D"?"The supermajority exists on paper; on a tax vote, the moderates remembered their districts.":"It was never going to be there for this governor, and now the failure has a number attached."}`;}
    }

      queue(g,10,{k:"deficit",d:4},"Deferral repayment comes due","you");}
  }
  const rel=clamp(0.6+g.legStanding/300,0.35,0.95);
  let finalSolve=solved*rel+(B.revised?1.5:0);
  // REAL-2: the CONFERENCE COMMITTEE writes its own changes into your budget before it reaches you
  const changes=[];
  const vetoDiscount=B.vetoCount||0; // each veto makes them concede one demand
  if(mx&&g.player.party!=="R"){
    if(mx.taxes===0&&g.actors.progs>10&&changes.length<2-vetoDiscount&&RNG.chance(0.65)){
      finalSolve+=2; g.fiscal.newTaxes+=2; B.confTax=true;
      changes.push("Conference ADDED ~$2B in revenue your January plan didn't have — the progressives' price for their votes. Sign it and you signed a tax.");}
    if(mx.cuts>=6&&g.actors.progs>25&&changes.length<2-vetoDiscount&&RNG.chance(0.5)){
      finalSolve-=2;
      changes.push("Conference RESTORED ~$2B of your cuts — the safety-net line the caucus would not cross.");}
  }
  if(mx&&g.legStanding<0&&changes.length<2-vetoDiscount&&RNG.chance(0.5)){
    g.fiscal.gimmicks+=2;
    changes.push("Conference slipped in ~$2B of deferrals and fund shifts nobody will explain on camera.");}
  if(!B.proposed)changes.push("This is entirely the Legislature's budget — Rivas and Limón wrote it without you. Its priorities are theirs; its signature line is yours.");
  B.awaiting={finalSolve:Math.max(finalSolve,0),changes,votes,taxNote,late:!!late};
  cov(g,"AP",`Budget passes the Legislature ${votes.asm}–${79-votes.asm}, ${votes.sen}–${40-votes.sen} — and lands on YOUR desk`,
    `${changes.length?"The conference committee did what conference committees do: "+changes.length+" change"+(changes.length>1?"s":"")+" you didn't ask for. ":""}The bill is on the desk (The Desk tab). Sign it, or veto it and eat the delay — Prop 25 docks legislator pay while you hold out, which is leverage on them, and White v. Davis strangles the treasury after July 1, which is leverage on everyone.${taxNote}`);
}
/* REAL-3: the actual signature decision */
function finishEnactment(g,reluctant){
  const B=g.fiscal.budget;if(!B.awaiting)return;
  const A=B.awaiting;B.awaiting=null;B.enacted=true;
  const mx=B.mix;
  if(mx&&mx.reserves>0){const draw=Math.min(mx.reserves,g.fiscal.sfeu); // REAL-7: money moves at ENACTMENT
    g.fiscal.sfeu-=draw;g.fiscal.resLao-=draw;g.fiscal.resAdmin-=draw;}
  g.fiscal.deficit=clamp(g.fiscal.deficit-A.finalSolve,-18,99);
  if(B.confTax)g.fiscal.taxSigned=true; // you signed the conference's tax — no_taxes knows
  const y=turnDate(g.turn).y;
  const newP98=Math.round((125.5+(y-2027)*2.4+(g.market.revApplied||0)*TUNING.P98_SHARE)*10)/10;
  g.fiscal.prop98=Math.max(95,newP98);
  const lateTxt=A.late?" — late, after Prop 25 docked legislator pay, a fact every member will privately blame on you":"";
  cov(g,"AP",`Budget signed${reluctant?" — at the deadline, without ceremony":""}${lateTxt}`,
    `${reluctant?"No signing statement, no pens handed out — the signature happened because the alternative was worse, and everyone in the building can read a clock. ":""}Roughly ${fmtB(A.finalSolve)} of the structural problem was addressed; the ${g.fiscal.deficit<0?"books now show a modeled operating SURPLUS of "+fmtB(Math.abs(g.fiscal.deficit)):"remaining "+fmtB(g.fiscal.deficit)+" annual gap rolls forward, compounding"}. The Prop 98 guarantee recomputed at enactment: ${fmtB(g.fiscal.prop98)} — the formula moved, nobody voted on it.`);
  if(reluctant)dAp(g,-0.5);
  if(!B.proposed){spendPC(g,5);g.legStanding-=5;}
}
function vetoBudget(g){
  const B=g.fiscal.budget;if(!B.awaiting)return;
  B.awaiting=null;B.vetoCount=(B.vetoCount||0)+1;B.late=(B.late||0)+1;B.confTax=false;
  spendPC(g,6);g.legStanding-=8;dAp(g,-1.5);
  cov(g,"AP",`VETOED: the governor sends the budget back`,
    `The message was one page and the message was the point: not this budget. The Legislature now reconvenes conference with legislator pay forfeiting daily (Prop 25) and the White v. Davis clock running toward July 1 — pressure that lands on them AND you. History's ledger on budget vetoes is short and mixed; the building's memory of them is long and specific. Next month's version will concede something. So, probably, will you.`);
}

/* ===================== 17. BILLS ===================== */
function suspenseFile(g,label){
  const held=g.bills.pipeline.filter(b=>b.stage==="suspense");
  if(!held.length)return;
  const out=[];
  for(const b of held){
    const p=clamp(0.42+(g.player.attrs.INS-5)*0.035+g.legStanding/220+(g.actors.mods+g.actors.progs)/400,0.1,0.9);
    if(b.rescued||RNG.r()<p){b.stage="floor";makeHoldouts(g,b);out.push([b,"released"]);}
    else{billDied(g,b,"held in Appropriations");out.push([b,"held"]);}
  }
  const died=out.filter(x=>x[1]==="held"),lived=out.filter(x=>x[1]==="released");
  cov(g,"CalMatters",`The suspense file moves (${label})`,
    `The Appropriations Committee met for ${RNG.int(9,14)} minutes. The chair read a list of bill numbers.${died.length?` Yours ${died.length>1?"were":"was"} on it: ${died.map(x=>x[0].num+" ("+x[0].t+")").join(", ")} — held, no vote recorded, no reasons given. The suspense file works like this every year and it has never once been about the merits.`:""}${lived.length?` Released to the floor: ${lived.map(x=>x[0].num).join(", ")}.`:""}`);
  g.bills.pipeline=g.bills.pipeline.filter(b=>b.stage!=="dead");
}
function billOutcome(g,b,res,eff){ // LEG-2: one ledger for the tracker panel
  g.bills.outcomeLog=(g.bills.outcomeLog||[]);
  g.bills.outcomeLog.unshift({t:g.turn,num:b.num,title:b.t,res,eff:eff||"",sponsored:!!b.sponsored});
  if(g.bills.outcomeLog.length>14)g.bills.outcomeLog.pop();
}
/* SHELF-1: the floor has NAMES. When your bill reaches the floor, the whip count identifies the
   actual holdouts — synthetic members with districts and prices — and you can call them one by one. */
const HOLDOUT_POOL=[
 {nm:"Asm. R. Calloway",bloc:"mods",dist:"Tri-Valley",price:"a veterans' courthouse in the district budget"},
 {nm:"Asm. D. Osei-Mensah",bloc:"progs",dist:"South L.A.",price:"a signing ceremony at her community college"},
 {nm:"Asm. T. Bracamonte",bloc:"mods",dist:"North San Diego",price:"your veto pen away from his biotech bill"},
 {nm:"Asm. K. Silvestri",bloc:"gop",dist:"Placer County",price:"a fire station ribbon-cutting with you in it"},
 {nm:"Asm. J. Ferreira-Cruz",bloc:"progs",dist:"East Bay",price:"a public commitment on tenant funding"},
 {nm:"Asm. M. Twomey",bloc:"mods",dist:"Ventura Coast",price:"an appointment for her chief of staff"},
 {nm:"Asm. A. Okonjo",bloc:"progs",dist:"Sacramento",price:"a line about equity in the signing statement"},
 {nm:"Asm. B. Halloran",bloc:"gop",dist:"Shasta",price:"quiet help on a water district earmark"},
 {nm:"Sen. P. Villaseñor",bloc:"mods",dist:"Fresno",price:"a UC extension campus feasibility study"},
 {nm:"Sen. G. Nakashima",bloc:"progs",dist:"Silicon Valley",price:"a meeting she can describe as 'productive'"},
 {nm:"Sen. L. Beauchamp",bloc:"mods",dist:"Orange County",price:"your endorsement withheld from his primary rival"},
 {nm:"Sen. C. Andrade",bloc:"progs",dist:"San Fernando Valley",price:"a board seat for a loyal labor ally"},
];
function hashStr(s){let h=7;for(const ch of s)h=(h*31+ch.charCodeAt(0))>>>0;return h;}
function makeHoldouts(g,b){ // deterministic (no RNG stream use — saves replay identically)
  if(b.holdouts||b.needs23)return; // 2/3 bills die on arithmetic, not on three phone calls
  const seedH=hashStr(b.id+":"+g.turn+":"+g.seed);
  const picks=[];const used=new Set();
  for(let i=0;i<3;i++){let idx=(seedH>>>(i*5))%HOLDOUT_POOL.length; // >>> — a signed shift here once indexed the pool at [-5]
    while(used.has(idx))idx=(idx+1)%HOLDOUT_POOL.length;
    used.add(idx);picks.push({...HOLDOUT_POOL[idx],called:false,won:false});}
  b.holdouts=picks;
}
function billEffSummary(fx){ // ACT-2: what a signature actually puts on the books
  const parts=[];
  if(fx.gf)parts.push(`GF ${fx.gf>0?"+":""}${fx.gf}B/yr`);
  const nm={housingBoost:"housing",homelessBoost:"homelessness",insurBoost:"insurance",medicalBoost:"Medi-Cal",prisonRelief:"prison relief",grid:"grid",pensionCut:"pension"};
  for(const[k,v]of Object.entries(fx.issue||{}))if(nm[k])parts.push(`${nm[k]} ${v>0?"+":""}${v} on the books`);
  if(!parts.length)parts.push("fiscally neutral — the fight was about power, not money");
  return parts.join(" · ");
}
function billFiscalTag(b){ // LEG-4: every bill wears its fiscal sign on the label
  const gf=b.sign&&b.sign.gf;
  return gf>0?`raises ${fmtB(gf)}/yr`:gf<0?`costs ${fmtB(-gf)}/yr`:"fiscally neutral";
}
function billDied(g,b,how){
  // REAL-LEG-1: the Legislature runs two-year sessions. A bill that stalls in committee or on the
  // suspense file in an ODD year isn't necessarily dead — it can become a "two-year bill" and
  // return in January. Floor deaths and failed urgency runs stay dead: those were counted in public.
  const y=turnDate(g.turn).y;
  if(y%2===1&&b.sponsored&&!b.urgent&&(how==="held in Appropriations"||how==="died in policy committee")&&RNG.chance(0.45)){
    b.stage="twoYear";
    billOutcome(g,b,"made a two-year bill");
    cov(g,"CalMatters",`${b.num} survives as a two-year bill`,
      `${b.t} ${how==="held in Appropriations"?"stayed on the chair's held list":"stalled in committee"} — but this is year one of the biennium, and the author moved to make it a two-year bill. It sleeps until January, keeps its co-authors, and restarts in committee with the amendments everyone now knows it needs. Half of Sacramento's eventual laws died once first.`);
    return;
  }
  b.stage="dead";(g.bills.deadSess=g.bills.deadSess||{})[b.id]=y;billOutcome(g,b,how);
}
function sessionEnd(g,y){
  // player floor bills resolve — L2: counted, not rolled; LEG-3: whipped seats count here
  for(const b of g.bills.pipeline.filter(b=>b.stage==="floor")){
    const chit=g.flags.committeeChit?2:0; if(chit)g.flags.committeeChit=false; // R4: ally-appointment die
    const v=voteModel(g,true,{bonusSeats:chit+(b.whip||0),tax:!!b.needs23}); // 2/3 revenue bills get no GOP votes
    const needA=b.needs23?54:41, needS=b.needs23?27:21;
    if(v.asm>=needA&&v.sen>=needS){b.stage="passed";b.floorVotes=v;g.bills.desk.push(b);}
    // REAL-LEG-2: bills rarely die clean on the floor — a near miss gets amended to passage instead.
    // Leadership finds the last votes by watering it down: the gf and policy effects shrink to 60%.
    else if(!b.needs23&&needA-v.asm<=3&&needS-v.sen<=3){
      b.stage="passed";b.amended=true;b.floorVotes={asm:needA,sen:needS};
      const scale=x=>Math.round(x*0.6*100)/100;
      b.sign={...b.sign,gf:b.sign.gf?scale(b.sign.gf):b.sign.gf,
        issue:b.sign.issue?Object.fromEntries(Object.entries(b.sign.issue).map(([k,v2])=>[k,scale(v2)])):b.sign.issue};
      g.bills.desk.push(b);
      cov(g,"CalMatters",`${b.num} passes — after the amendments that made it possible`,
        `${b.t} was ${Math.max(needA-v.asm,needS-v.sen)} votes short at dinnertime and passed at midnight, which tells you everything: the holdouts named their price and the price was the bill's strength. The version on its way to the desk does roughly 60 percent of what the version introduced in the spring would have done. In this building that is called success, and by the standards of the alternative, it is.`);}
    else{billDied(g,b,"died on the floor");
      cov(g,"Politico",`${b.num} dies in the August rush — ${v.asm} of ${needA} in the Assembly`,
        `${b.t} came up ${Math.max(needA-v.asm,needS-v.sen)} votes short when the roll closed at midnight on the 31st: ${v.asm}–${79-v.asm} in the Assembly against the ${needA} it needed, ${v.sen}–${40-v.sen} in the Senate against ${needS}.${b.whip?" The "+b.whip+" votes you whipped showed up; they were not enough.":" Nobody whipped it, and it shows in the count."} Not a rumor of a margin — a number, printed in the Daily Journal, attached to your name. Eight hundred bills moved in seventy-two hours; yours was counted out. There is always next session, says everyone, to everyone, annually.`);}
  }
  g.bills.pipeline=g.bills.pipeline.filter(b=>!["dead","passed"].includes(b.stage));
  // generate the legislature's own bills for the desk — LEG-1: year-gated pool, and a real September volume
  const inPlay=new Set([...g.bills.pipeline.map(b=>b.id),...g.bills.desk.map(b=>b.id)]);
  const deadY=g.bills.deadSess||{};
  const pool=BILL_POOL.filter(b=>!b.sponsorOnly&&(b.yr||2027)<=y&&!g.bills.enactedIds.includes(b.id)
    &&!g.flags.sessionBillsDone[b.id]&&!inPlay.has(b.id)&&deadY[b.id]!==y
    &&!(b.needs23&&!(g.player.party!=="R"&&g.actors.progs>5))); // 2/3 bills only reach the desk when the caucus math exists
  const n=Math.min(RNG.int(5,8),pool.length);
  const picked=[];
  for(let i=0;i<n;i++){
    let b;do{b=RNG.pick(pool);}while(picked.includes(b));
    picked.push(b);g.flags.sessionBillsDone[b.id]=true;
    g.bills.desk.push({...b,fromLeg:true});
  }
  if(g.bills.desk.length)cov(g,"CalMatters","Session ends — the desk fills",
    `The Legislature adjourned at midnight August 31 in the usual blizzard: roughly 800 bills in the final seventy-two hours, of which ${g.bills.desk.length} consequential ones now sit on the governor's desk with a September 30 deadline. Sign, veto, or let them become law without a signature — the third option fools no one.`);
}
function enactBill(g,b,decision,silent){
  const fx=decision==="sign"?b.sign:b.veto;
  // REAL-LEG-3: chaptered statutes take effect JANUARY 1 (Cal. Const. art. IV §8(c)); urgency = immediate
  const efLag=b.urgent?2:(12-turnDate(g.turn).m)+1;
  billOutcome(g,b,decision==="sign"?(silent?"became law unsigned":"signed"):"vetoed",
    decision==="sign"?billEffSummary(fx)+(!b.urgent&&(fx.gf||fx.issue)?" · effective Jan 1":""):"");
  for(const[id,d]of Object.entries(fx.act||{}))dAct(g,id,d);
  if(fx.ap)dAp(g,fx.ap);
  if(decision==="sign"){
    g.bills.signed.push(b.id);g.bills.enactedIds.push(b.id);
    if(fx.gf)queue(g,efLag,{k:"deficit",d:-fx.gf},"statute takes fiscal effect ("+b.num+")","you");
    if(fx.tax)g.fiscal.taxSigned=true;
    if(b.id==="b_saas_repeal")g.flags.saasRepealed=true;
    if(b.id==="b_insur")g.issues.insur=clamp(g.issues.insur+(b.urgent?8:4),0,100); // the announcement effect: carriers price the signal
    // ACT-2: statutes land in the LAW columns — permanent until repealed, unlike programs and EOs
    const iss=fx.issue||{};
    if(iss.housingBoost)queue(g,efLag,{k:"law",key:"lawHousing",d:iss.housingBoost},"statute takes effect: housing ("+b.num+")","you");
    if(iss.homelessBoost)queue(g,efLag,{k:"law",key:"lawHomeless",d:iss.homelessBoost},"statute takes effect: homelessness ("+b.num+")","you");
    if(iss.insurBoost)queue(g,efLag,{k:"law",key:"lawInsur",d:iss.insurBoost},"statute takes effect: insurance ("+b.num+")","you");
    if(iss.medicalBoost)queue(g,efLag,{k:"law",key:"lawMedical",d:iss.medicalBoost},"statute takes effect: Medi-Cal ("+b.num+")","you");
    if(iss.prisonRelief)queue(g,efLag,{k:"law",key:"lawPrison",d:iss.prisonRelief},"statute takes effect: corrections ("+b.num+")","you");
    if(iss.grid)queue(g,b.urgent?2:efLag+4,{k:"grid",d:iss.grid},"grid procurement ("+b.num+")","you");
    if(fx.fedHeat)g.actors.fedadmin=clampA(g.actors.fedadmin-6);
    if(iss.pensionCut)g.fiscal.pension=Math.max(180,g.fiscal.pension-iss.pensionCut); // MECH-6: single write, no dead queue
  }else{
    g.bills.vetoed.push(b.id);
    if(!silent)cov(g,"Politico",`Veto: ${b.num} (${b.t})`,
      `The override threshold is two-thirds — which ${g.player.party==="D"?"this Legislature possesses and, per decades of practice, will not use against a governor of its own party":"the supermajority possesses on paper. Overrides essentially never happen in the modern era; the last routine ones predate most sitting members"}. The veto stands. The sponsors will remember.`);
  }
}
